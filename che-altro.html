<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI — studio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-color: #f7f7f8;
    --border-color: #e5e5e5;
    --accent-color: #1a1a1a;
    --sidebar-width: 140px;
    --header-height: 140px;
  }

  body {
    width: 100%; height: 100%;
    background: var(--bg-color);
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    display: flex;
    user-select: none;
  }

  /* RULLINO VERTICALE */
  #container-v {
    position: relative; width: var(--sidebar-width); height: 100vh;
    border-right: 1px solid var(--border-color); background: var(--bg-color); z-index: 100;
  }
  #rullino-v {
    height: 100%; overflow-y: auto; padding: 16px 10px;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  #rullino-v::-webkit-scrollbar { display: none; }

  /* CONTENUTO PRINCIPALE */
  #main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; }

  /* RULLINO ORIZZONTALE */
  #container-h {
    position: relative; height: var(--header-height); width: 100%;
    border-bottom: 1px solid var(--border-color); background: var(--bg-color); z-index: 100;
  }
  #rullino-h {
    height: 100%; display: flex; align-items: center; padding: 0 16px; gap: 12px;
    overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
  }
  #rullino-h::-webkit-scrollbar { display: none; }

  /* CURSORI MECCANICI (LINEA + RETTANGOLO) */
  .linea-v { position: absolute; top: 0; right: 0; width: 4px; height: 100%; cursor: ns-resize; }
  #rettangolo-v { position: absolute; right: 0; width: 4px; height: 60px; background: var(--accent-color); top: 0; cursor: grab; }

  .linea-h { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; cursor: ew-resize; }
  #rettangolo-h { position: absolute; bottom: 0; height: 4px; width: 60px; background: var(--accent-color); left: 0; cursor: grab; }

  #rullino-h img, #rullino-v img {
    height: 100px; width: auto; flex-shrink: 0; cursor: pointer;
    filter: grayscale(1) opacity(0.5); transition: 0.3s;
  }
  #rullino-v img { width: 100%; height: auto; margin-bottom: 10px; }
  #rullino-h img:hover, #rullino-v img:hover { filter: none; opacity: 1; }

  /* TAVOLO */
  #tavolo-container { flex-grow: 1; position: relative; overflow: hidden; cursor: grab; background-color: #f0f0f1; }
  #tavolo-texture { position: absolute; inset: 0; background-image: url('tavolo.jpg'); background-size: cover; opacity: 1; pointer-events: none; }
  #superficie { position: absolute; width: 4000px; height: 4000px; top: 0; left: 0; }

  /* ILLUMINAZIONE NEUTRA FISSA */
  #overlay-luce { 
    position: absolute; inset: 0; pointer-events: none; z-index: 10; 
    background: radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.1) 0%, transparent 80%);
  }

  /* FOGLIO */
  .foglio {
    position: absolute; background: #fff; padding: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06); transition: opacity 0.4s ease;
    cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
    display: flex; align-items: center; justify-content: center;
  }
  .foglio img { display: block; max-width: 100%; max-height: 100%; pointer-events: none; }

  nav { position: fixed; bottom: 28px; left: calc(var(--sidebar-width) + 24px); z-index: 200; font-size: 9px; letter-spacing: 0.2em; }
  nav a { display: block; color: #ccc; text-decoration: none; margin-bottom: 4px; }
  nav a:hover { color: #888; }
</style>
</head>
<body>

<div id="container-v">
  <div id="rullino-v"></div>
  <div class="linea-v"><div id="rettangolo-v"></div></div>
</div>

<div id="main-content">
  <div id="container-h">
    <div id="rullino-h"></div>
    <div class="linea-h"><div id="rettangolo-h"></div></div>
  </div>
  <div id="tavolo-container">
    <div id="tavolo-texture"></div>
    <div id="superficie"></div>
    <div id="overlay-luce"></div>
  </div>
</div>

<nav>
  <a href="/">&#x25A1;</a>
  <a href="/blues-rosa">blues rosa</a>
  <a href="/bitless-mirage">bitless / mirage</a>
  <a href="/matrice">matrice</a>
</nav>

<script>
const TOTALE = 20;
const IN_FIERI = ['19a']; 
const finiti = Array.from({length: TOTALE}, (_, i) => `${i+1}.jpg`);
const infieri = IN_FIERI.map(f => `${f}.jpg`);

const superficie = document.getElementById('superficie');
const tavoloContainer = document.getElementById('tavolo-container');
const rv = document.getElementById('rullino-v'), rh = document.getElementById('rullino-h');
const retV = document.getElementById('rettangolo-v'), retH = document.getElementById('rettangolo-h');

let pos = { x: -1500, y: -1500 };
superficie.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0)`;

// SCROLL & CURSORI
rv.onscroll = () => {
    if (draggingV) return;
    let perc = rv.scrollTop / (rv.scrollHeight - rv.clientHeight);
    retV.style.top = (perc * (rv.clientHeight - retV.offsetHeight)) + "px";
};
rh.onscroll = () => {
    if (draggingH) return;
    let perc = rh.scrollLeft / (rh.scrollWidth - rh.clientWidth);
    retH.style.left = (perc * (rh.clientWidth - retH.offsetWidth)) + "px";
};

let draggingV = false, draggingH = false;
retV.onmousedown = (e) => { draggingV = true; e.preventDefault(); };
retH.onmousedown = (e) => { draggingH = true; e.preventDefault(); };

window.onmousemove = (e) => {
    if (draggingV) {
        let rect = document.getElementById('container-v').getBoundingClientRect();
        let perc = Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height));
        rv.scrollTop = perc * (rv.scrollHeight - rv.clientHeight);
        retV.style.top = (perc * (rv.clientHeight - retV.offsetHeight)) + "px";
    }
    if (draggingH) {
        let rect = document.getElementById('container-h').getBoundingClientRect();
        let perc = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        rh.scrollLeft = perc * (rh.scrollWidth - rh.clientWidth);
        retH.style.left = (perc * (rh.clientWidth - retH.offsetWidth)) + "px";
    }
    if (dragTavolo) {
        pos.x += e.clientX - lastTavolo.x;
        pos.y += e.clientY - lastTavolo.y;
        lastTavolo = { x: e.clientX, y: e.clientY };
        superficie.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0)`;
    }
};

window.onmouseup = () => { draggingV = false; draggingH = false; dragTavolo = false; };

// TRASCINAMENTO TAVOLO
let dragTavolo = false, lastTavolo = {x:0, y:0};
tavoloContainer.onmousedown = e => {
    if (e.target.closest('.foglio')) return;
    dragTavolo = true; lastTavolo = { x: e.clientX, y: e.clientY };
};

// LANDING DISEGNI
function mettiSulTavolo(src) {
    const foglio = document.createElement('div');
    foglio.className = 'foglio';
    const w = 340 + Math.random() * 80;
    const rot = (Math.random() - 0.5) * 5;
    const rect = tavoloContainer.getBoundingClientRect();
    const centroX = Math.abs(pos.x) + (rect.width / 2);
    const centroY = Math.abs(pos.y) + (rect.height / 2);

    foglio.style.cssText = `
        width:${w}px; max-height:${rect.height - 80}px; left:${centroX}px; top:${centroY}px; 
        transform:translate(-50%, -50%) rotate(${rot}deg); opacity:0;
    `;
    
    const img = document.createElement('img');
    img.src = src;
    foglio.appendChild(img);
    superficie.appendChild(foglio);
    setTimeout(() => { foglio.style.opacity = '1'; }, 50);
    foglio.onclick = (e) => { e.stopPropagation(); foglio.style.opacity = '0'; setTimeout(() => foglio.remove(), 400); };
}

// INIT
const addThumb = (f, dest) => {
    const img = document.createElement('img');
    img.src = `disegni/${f}`;
    img.onclick = (e) => { e.stopPropagation(); mettiSulTavolo(img.src); };
    img.onerror = () => img.remove();
    dest.appendChild(img);
};

// Modifica qui: usiamo la copia per non invertire l'array originale
[...finiti].reverse().forEach(f => addThumb(f, rv));
infieri.forEach(f => addThumb(f, rh));
</script>
</body>
</html>
