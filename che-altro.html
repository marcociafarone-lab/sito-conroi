<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Che Altro - Mosaico Denso</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: grab;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body:active { cursor: grabbing; }

        #world {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            will-change: transform;
        }

        #viewport {
            position: absolute;
            width: 12000px;
            height: 12000px;
            top: -6000px;
            left: -6000px;
        }

        .patch-container {
            position: absolute;
            overflow: hidden;
            background-color: #000;
            /* Rimosso il bordo e lo spazio per l'effetto macro */
            border: none; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .patch-item {
            width: 101%; /* Leggermente più grande per evitare linee di separazione */
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.05); /* Zoom leggero */
            filter: grayscale(1) brightness(0.7);
            transition: filter 0.6s ease, transform 0.6s ease, opacity 1s ease;
            opacity: 0;
            pointer-events: none;
        }

        .patch-item.loaded { opacity: 1; }

        .patch-container:hover {
            z-index: 10;
        }

        .patch-container:hover .patch-item {
            filter: grayscale(0) brightness(1);
            transform: translate(-50%, -50%) scale(1.1); /* Effetto respiro al passaggio */
        }

        .placeholder-id {
            font-size: 8px;
            color: #111;
        }

        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            display: none;
            justify-content: center; align-items: center;
            z-index: 10000;
            cursor: zoom-out;
        }

        #modal img { 
            max-width: 95%; 
            max-height: 95%; 
            object-fit: contain; 
        }

        #ui-layer {
            position: fixed;
            top: 35px; left: 35px;
            pointer-events: none; z-index: 1000;
        }

        .label { font-size: 9px; letter-spacing: 5px; color: #222; text-transform: uppercase; }
        .title { color: #444; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }
        
        #shuffle-btn {
            position: fixed;
            top: 35px; right: 35px;
            background: transparent;
            border: 1px solid #1a1a1a;
            color: #333;
            padding: 8px 15px;
            font-family: inherit;
            font-size: 9px;
            letter-spacing: 3px;
            cursor: pointer;
            z-index: 1001;
            pointer-events: auto;
            transition: all 0.3s;
        }

        #shuffle-btn:hover { color: #fff; border-color: #fff; }

        #instruction { position: fixed; bottom: 35px; right: 35px; font-size: 8px; color: #222; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="label">Frammenti / Piano Solo</div>
        <div class="title">Che Altro</div>
    </div>

    <button id="shuffle-btn" onclick="renderMosaico()">RESHUFFLE</button>

    <div id="instruction">FLUSSO CONTINUO / CLICCA PER IL DETTAGLIO</div>

    <div id="world">
        <div id="viewport"></div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="full-image" src="">
    </div>

    <script>
        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const modal = document.getElementById('modal');
        const fullImg = document.getElementById('full-image');

        const fileCount = 14; 
        const repetitions = 2; // Aumentato leggermente per riempire meglio l'area

        let offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let velocity = { x: 0, y: 0 };
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        const friction = 0.95;

        function renderMosaico() {
            viewport.innerHTML = '';
            
            const colW = 380; // Colonne più larghe per un look più macro
            const cols = 5;   
            const gutter = 0; // ZERO fughe
            const colHeights = new Array(cols).fill(0);

            const startX = 6000 - ((cols * colW) / 2);
            const startY = 6000;

            for (let i = 0; i < (fileCount * repetitions); i++) {
                const fileIndex = (i % fileCount) + 1;
                const imgSrc = `disegni/${fileIndex}.jpg`;

                const container = document.createElement('div');
                container.className = 'patch-container';

                const shortest = colHeights.indexOf(Math.min(...colHeights));
                
                // Altezza basata su un calcolo deterministico ma che sembri organico
                const h = 250 + ((i * 193) % 350); 
                
                const x = startX + (shortest * (colW + gutter));
                const y = startY + colHeights[shortest];

                container.style.width = (colW + 1) + "px"; // +1 per sovrapposizione minima antipixel-vuoti
                container.style.height = (h + 1) + "px";
                container.style.left = x + "px";
                container.style.top = y + "px";

                const placeholder = document.createElement('div');
                placeholder.className = 'placeholder-id';
                placeholder.innerText = fileIndex;
                container.appendChild(placeholder);

                const img = document.createElement('img');
                img.className = 'patch-item';
                img.src = imgSrc;

                img.onload = () => {
                    img.classList.add('loaded');
                    placeholder.style.display = 'none';
                };

                container.onclick = () => {
                    if (Math.abs(velocity.x) > 2 || Math.abs(velocity.y) > 2) return;
                    fullImg.src = imgSrc;
                    modal.style.display = 'flex';
                };

                container.appendChild(img);
                viewport.appendChild(container);

                colHeights[shortest] += (h + gutter);
            }
        }

        function physicsLoop() {
            if (!isDragging) {
                offset.x += velocity.x;
                offset.y += velocity.y;
                velocity.x *= friction;
                velocity.y *= friction;
                updateTransform();
            }
            requestAnimationFrame(physicsLoop);
        }

        function updateTransform() {
            world.style.transform = `translate3d(${offset.x}px, ${offset.y}px, 0)`;
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            isDragging = true;
            lastMouse.x = e.clientX; lastMouse.y = e.clientY;
            velocity = { x: 0, y: 0 };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            offset.x += dx; offset.y += dy;
            velocity.x = dx; velocity.y = dy;
            lastMouse.x = e.clientX; lastMouse.y = e.clientY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.onload = () => {
            renderMosaico();
            physicsLoop();
        };

        window.onresize = () => {
            offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
            updateTransform();
        };
    </script>
</body>
</html>
