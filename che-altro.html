<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI — che altro?</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #f5f2ec;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
  }

  #rullino-h, #rullino-v {
    position: fixed;
    z-index: 100; /* Sopra a tutto */
    background: #f5f2ec;
  }

  #rullino-h {
    top: 0; left: 140px; right: 0; height: 140px;
    border-bottom: 1px solid #ddd;
    display: flex; align-items: center; padding: 0 16px; gap: 12px;
    overflow-x: auto; overflow-y: hidden;
  }

  #rullino-v {
    left: 0; top: 0; bottom: 0; width: 140px;
    border-right: 1px solid #ddd;
    overflow-y: auto; overflow-x: hidden; padding: 16px 10px;
  }

  #rullino-h img, #rullino-v img {
    height: 100px; width: auto; flex-shrink: 0; cursor: pointer;
    filter: grayscale(1) brightness(0.7); transition: 0.3s;
  }
  #rullino-v img { width: 100%; height: auto; margin-bottom: 10px; }
  #rullino-h img:hover, #rullino-v img:hover { filter: none; }

  #tavolo {
    position: fixed;
    left: 0; top: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
    z-index: 5;
  }
  #tavolo:active { cursor: grabbing; }

  #superficie {
    position: absolute;
    width: 4000px; height: 4000px;
  }

 .foglio {
    position: absolute;
    background: #fff;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03); 
    border: 1px solid rgba(0,0,0,0.02);
    transition: opacity 0.5s, transform 0.5s;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .foglio img { display: block; width: 100%; height: auto; pointer-events: none; }

  #shuffle {
    position: fixed; bottom: 28px; right: 32px; z-index: 200;
    background: transparent; border: 1px solid #ccc; color: #aaa;
    font-family: 'Courier New', monospace; font-size: 8px;
    letter-spacing: 0.3em; padding: 8px 14px; cursor: pointer;
  }

  nav {
    position: fixed; bottom: 28px; left: 152px; z-index: 200;
    font-size: 9px; letter-spacing: 0.2em; line-height: 2;
  }
  nav a { display: block; color: rgba(0,0,0,0.2); text-decoration: none; }
</style>
</head>
<body>

<div id="rullino-v"></div>
<div id="rullino-h"></div>
<div id="tavolo"><div id="superficie"></div></div>

<button id="shuffle" onclick="cheAltro()">che altro?</button>

<nav>
  <a href="/">&#x25A1;</a>
  <a href="/blues-rosa">blues rosa</a>
  <a href="/bitless-mirage">bitless / mirage</a>
  <a href="/matrice">matrice</a>
</nav>

<script>
const TOTALE = 20;
const IN_FIERI = ['19a']; 

const finiti = Array.from({length: TOTALE}, (_, i) => `${i+1}.jpg`);
const infieri = IN_FIERI.map(f => `${f}.jpg`);
const archivioCompleto = [...finiti, ...infieri];

const superficie = document.getElementById('superficie');
let pos = {x: (window.innerWidth - 140) / 2, y: (window.innerHeight - 140) / 2};
let modalitaFocus = false;
let fogliInPausa = [];

function cheAltro() {
    modalitaFocus = false;
    superficie.innerHTML = '';
    
    // Peschiamo 5 disegni e mescoliamo l'ordine per cambiare arrangement
    const sel = [...archivioCompleto].sort(() => Math.random() - 0.5).slice(0, 5);
    
    const w = 280; 
    const gapX = 320; 
    const gapY = 380;
    const cx = 2000, cy = 1850;

    sel.forEach((f, idx) => {
        const foglio = document.createElement('div');
        foglio.className = 'foglio';
        const img = document.createElement('img');
        img.src = `disegni/${f}`;
        foglio.appendChild(img);
        
        let x, y;
        if (idx < 3) {
            x = cx - gapX + (idx * gapX) - (w/2);
            y = cy - (gapY/2);
        } else {
            x = cx - (gapX/2) + ((idx-3) * gapX) - (w/2);
            y = cy + (gapY/2) - 100;
        }

        foglio.style.cssText = `width:${w}px; left:${x}px; top:${y}px; z-index:${idx}; transform:rotate(0deg);`;
        
        // Se clicco veloce è un'apertura, se trascino no
        let t0;
        foglio.onmousedown = () => t0 = Date.now();
        foglio.onmouseup = () => {
            if (Date.now() - t0 < 200) mettiSulTavolo(img.src);
        };
        
        superficie.appendChild(foglio);
    });
}

function mettiSulTavolo(src) {
    if (modalitaFocus) ritornaAlTavolo();
    modalitaFocus = true;
    fogliInPausa = document.querySelectorAll('.foglio');
    fogliInPausa.forEach(f => { f.style.opacity = '0'; f.style.pointerEvents = 'none'; });

    const focus = document.createElement('div');
    focus.className = 'foglio focus-mode';
    const w = 550;
    const x = 2000 - pos.x + (window.innerWidth - 140)/2 - w/2;
    const y = 2000 - pos.y + (window.innerHeight - 140)/2 - 300;
    
    focus.style.cssText = `width:${w}px; left:${x}px; top:${y}px; z-index:999;`;
    const img = document.createElement('img'); img.src = src;
    focus.appendChild(img);
    superficie.appendChild(focus);
    focus.onclick = () => ritornaAlTavolo(focus);
}

function ritornaAlTavolo(el) {
    modalitaFocus = false;
    if(el) el.remove();
    fogliInPausa.forEach(f => { f.style.opacity = '1'; f.style.pointerEvents = 'auto'; });
}

// DRAG UNIVERSALE
let drag = false, last = {x:0, y:0};
window.onmousedown = e => {
    if (e.target.closest('#rullino-v') || e.target.closest('#rullino-h') || e.target.id === 'shuffle') return;
    drag = true; last = {x:e.clientX, y:e.clientY};
};
window.onmousemove = e => {
    if (!drag) return;
    pos.x += e.clientX - last.x; pos.y += e.clientY - last.y;
    last = {x:e.clientX, y:e.clientY};
    superficie.style.transform = `translate3d(${pos.x}px,${pos.y}px,0)`;
};
window.onmouseup = () => drag = false;

// Rullini
const addThumb = (f, dest) => {
    const img = document.createElement('img');
    img.src = `disegni/${f}`;
    img.onclick = () => mettiSulTavolo(img.src);
    img.onerror = () => img.remove();
    dest.appendChild(img);
};
[...finiti].reverse().forEach(f => addThumb(f, document.getElementById('rullino-v')));
infieri.forEach(f => addThumb(f, document.getElementById('rullino-h')));

superficie.style.transform = `translate3d(${pos.x}px,${pos.y}px,0)`;
cheAltro();
</script>
</body>
</html>
