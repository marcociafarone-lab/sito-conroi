<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI — studio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-color: #f7f7f8;
    --border-color: #e5e5e5;
    --accent-color: #1a1a1a;
    --sidebar-width: 140px;
  }

  body {
    width: 100%; height: 100%;
    background: var(--bg-color);
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    display: flex;
    user-select: none;
  }

  /* RULLINO VERTICALE (SIDEBAR) */
  #container-v {
    position: relative; width: var(--sidebar-width); height: 100vh;
    border-right: 1px solid var(--border-color); background: var(--bg-color); z-index: 100;
    flex-shrink: 0;
  }
  #rullino-v {
    height: 100%; overflow-y: auto; padding: 16px 10px;
    scrollbar-width: none; -ms-overflow-style: none;
    display: flex; flex-direction: column;
  }
  #rullino-v::-webkit-scrollbar { display: none; }
  #rullino-v img { width: 100%; height: auto; margin-bottom: 10px; cursor: pointer; filter: grayscale(1) opacity(0.5); transition: 0.3s; }
  #rullino-v img:hover { filter: none; opacity: 1; }

  /* CONTENUTO PRINCIPALE (TAVOLO) */
  #main-content { flex-grow: 1; height: 100vh; position: relative; overflow: hidden; background: #eee; }
  #tavolo-texture { position: absolute; inset: 0; background-image: url('tavolo.jpg'); background-size: cover; background-position: center; }
  #superficie { position: absolute; inset: 0; z-index: 5; }

  /* FOGLI SUL TAVOLO */
  .foglio {
    position: absolute; background: #fff; padding: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06); transition: opacity 0.4s ease, transform 0.4s ease;
    cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
    display: flex; align-items: center; justify-content: center;
    /* PROTEZIONE SBORDAMENTO DESKTOP */
    max-height: 85vh !important; 
    max-width: 85% !important;
  }
  .foglio img { display: block; max-width: 100%; max-height: 100%; pointer-events: none; object-fit: contain; }

  nav {
    position: fixed; bottom: 20px; left: calc(var(--sidebar-width) + 24px);
    z-index: 200; font-size: 9px; letter-spacing: 0.2em;
  }
  nav a { display: block; color: #ccc; text-decoration: none; margin-bottom: 4px; }

/* -----------------------------------------------------------
     LOGICA MOBILE: INVERSIONE BARRE
  ----------------------------------------------------------- */

  @media (max-width: 768px) {
    /* 1. VERTICALE (Portrait) */
    @media (orientation: portrait) {
      body { flex-direction: column; } /* Impila rullino e tavolo */
      
      #container-v { 
        order: 2; /* Sposta il rullino sotto il tavolo */
        width: 100%; 
        height: 110px; 
        border-right: none; 
        border-top: 1px solid var(--border-color); 
      }
      
      #rullino-v { 
        flex-direction: row !important; /* Forza la riga */
        overflow-x: auto !important; 
        overflow-y: hidden !important; 
        align-items: center; 
        padding: 0 15px; 
        gap: 12px; 
      }
      
      #rullino-v img { 
        height: 80px; 
        width: auto; 
        margin-bottom: 0; 
      }
      
      nav { 
        bottom: 130px; /* Alza i link sopra il rullino */
        left: 20px; 
      }
      
      .foglio { 
        width: 85% !important; 
        max-height: 55vh !important; /* Più piccolo per far stare il rullino sotto */
      }
    }

    /* 2. ORIZZONTALE (Landscape) */
    @media (orientation: landscape) {
      body { flex-direction: row; } /* Ritorna alla disposizione classica */
      
      #container-v { 
        width: 80px; 
        height: 100vh; 
        border-right: 1px solid var(--border-color); 
      }
      
      #rullino-v { 
        flex-direction: column !important; 
        overflow-y: auto !important; 
        overflow-x: hidden !important; 
      }
      
      #rullino-v img { 
        width: 100%; 
        height: auto; 
        margin-bottom: 10px; 
      }
      
      nav { 
        bottom: 20px; 
        left: 100px; 
      }
      
      .foglio { 
        max-height: 85vh !important; 
        width: auto !important; 
      }
    }
  }
</style>
</head>
<body>

<div id="container-v">
  <div id="rullino-v"></div>
</div>

<div id="main-content">
  <div id="tavolo-texture"></div>
  <div id="superficie"></div>
  
  <nav>
    <a href="/">&#x25A1;</a>
    <a href="/blues-rosa">blues rosa</a>
    <a href="/bitless-mirage">bitless / mirage</a>
    <a href="/matrice">matrice</a>
  </nav>
</div>

<script>
const TOTALE = 20;
const finiti = Array.from({length: TOTALE}, (_, i) => `${i+1}.jpg`);
const superficie = document.getElementById('superficie');
const rv = document.getElementById('rullino-v');

function mettiSulTavolo(src) {
    const foglio = document.createElement('div');
    foglio.className = 'foglio';
    
    // 1. Definiamo la larghezza ideale (w)
    const w = window.innerWidth < 768 ? (window.innerWidth * 0.85) : (550 + Math.random() * 150);
    const rot = (Math.random() - 0.5) * 6;
    
    // 2. Applichiamo lo stile con i "freni di emergenza" (max-width e max-height)
    foglio.style.cssText = `
        width: ${w}px; 
        max-width: 90vw;   /* Mai più largo del 90% dello schermo */
        max-height: 80vh;  /* Mai più alto dell'80% dello schermo */
        left: 50%; 
        top: 50%; 
        transform: translate(-50%, -50%) rotate(${rot}deg); 
        opacity: 0;
        display: flex;     /* Centra l'immagine nel foglio */
    `;

    const img = document.createElement('img');
    img.src = src;
    
    // 3. Questo è il trucco: l'immagine deve adattarsi alla cornice senza forzarla
    img.style.maxWidth = "100%";
    img.style.maxHeight = "100%";
    img.style.objectFit = "contain";

    foglio.appendChild(img);
    superficie.appendChild(foglio);
    
    setTimeout(() => { foglio.style.opacity = '1'; }, 50);
    
    foglio.onclick = (e) => { 
        e.stopPropagation(); 
        foglio.style.opacity = '0'; 
        setTimeout(() => foglio.remove(), 400); 
    };
}

const addThumb = (f, dest) => {
    const img = document.createElement('img');
    img.src = `disegni/${f}`;
    img.onclick = (e) => { e.stopPropagation(); mettiSulTavolo(img.src); };
    img.onerror = () => img.remove();
    dest.appendChild(img);
};

[...finiti].reverse().forEach(f => addThumb(f, rv));
</script>
</body>
</html>
