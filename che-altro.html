<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Che Altro - Collasso e Sovrapposizione</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: grab;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body:active { cursor: grabbing; }

        #world {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            will-change: transform;
        }

        #viewport {
            position: absolute;
            width: 12000px;
            height: 12000px;
            top: -6000px;
            left: -6000px;
            display: block;
        }

        .patch-container {
            position: absolute;
            overflow: hidden;
            background-color: #050505;
            /* Linea di faglia quasi invisibile */
            border: 0.5px solid rgba(255,255,255,0.03); 
            cursor: pointer;
            box-sizing: border-box;
            /* Transizione meno "educata" e più secca */
            transition: all 0.9s cubic-bezier(0.2, 0, 0, 1), opacity 0.5s ease;
        }

        .patch-item {
            position: absolute;
            filter: grayscale(1) brightness(0.35) contrast(1.4);
            transition: filter 0.8s ease, opacity 1s ease;
            opacity: 0;
            pointer-events: none;
            max-width: none;
        }

        .patch-item.thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            top: 0 !important;
            left: 0 !important;
        }

        .patch-item.crop {
            width: auto;
            height: auto;
        }

        .patch-item.loaded { 
            opacity: 1; 
        }

        .patch-container:hover {
            z-index: 5000;
            border-color: rgba(255,255,255,0.5);
            outline: 1px solid rgba(255,255,255,0.2);
        }

        .patch-container:hover .patch-item {
            filter: grayscale(0) brightness(1) contrast(1.1);
        }

        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            justify-content: center; align-items: center;
            z-index: 10000;
            cursor: zoom-out;
        }

        #modal img { 
            max-width: 95%; 
            max-height: 95%; 
            object-fit: contain; 
        }

        #ui-layer {
            position: fixed;
            top: 40px; left: 40px;
            pointer-events: none; z-index: 2000;
        }

        .label { font-size: 8px; letter-spacing: 6px; color: #444; text-transform: uppercase; }
        .title { color: #888; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; }
        
        #shuffle-btn {
            position: fixed;
            top: 40px; right: 40px;
            background: transparent;
            border: 1px solid #222;
            color: #444;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 8px;
            letter-spacing: 4px;
            cursor: pointer;
            z-index: 2001;
            pointer-events: auto;
            transition: all 0.4s;
            outline: none;
        }

        #shuffle-btn:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.05); }
        #instruction { position: fixed; bottom: 40px; right: 40px; font-size: 7px; color: #222; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="label">Massa Critica / Collasso</div>
        <div class="title">Che Altro</div>
    </div>

    <button id="shuffle-btn" onclick="shuffleMosaico()">FORZA COLLASSO</button>

    <div id="instruction">SOVRAPPOSIZIONE AMMESSA / STRIZZAMENTO TOTALE</div>

    <div id="world">
        <div id="viewport"></div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="full-image" src="">
    </div>

    <script>
        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const modal = document.getElementById('modal');
        const fullImg = document.getElementById('full-image');

        let fileCount = 20; 
        let offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let velocity = { x: 0, y: 0 };
        let isDragging = false;
        let mouseDownTime = 0;
        let startPos = { x: 0, y: 0 };
        let lastMouse = { x: 0, y: 0 };
        const friction = 0.94;

        let patches = [];

        function initMosaico() {
            viewport.innerHTML = '';
            patches = [];
            for (let i = 1; i <= fileCount; i++) {
                createPatch(i, 'thumbnail');
                createPatch(i, 'crop');
            }
            setTimeout(shuffleMosaico, 100);
        }

        function createPatch(fileIndex, type) {
            const imgSrc = `disegni/${fileIndex}.jpg`;
            const container = document.createElement('div');
            container.className = 'patch-container';

            const img = document.createElement('img');
            img.className = `patch-item ${type}`;
            img.src = imgSrc;
            img.onload = () => img.classList.add('loaded');
            img.onerror = () => container.style.display = 'none';

            container.addEventListener('mouseup', (e) => {
                const duration = Date.now() - mouseDownTime;
                const dist = Math.hypot(e.clientX - startPos.x, e.clientY - startPos.y);
                if (duration < 250 && dist < 10) {
                    fullImg.src = imgSrc;
                    modal.style.display = 'flex';
                }
            });

            container.appendChild(img);
            viewport.appendChild(container);
            
            patches.push({
                el: container,
                imgEl: img,
                type: type,
                x: 0, y: 0, w: 0, h: 0
            });
        }

        function shuffleMosaico() {
            velocity = { x: 0, y: 0 };
            const centerX = 6000;
            const centerY = 6000;
            const placedRects = [];
            
            // Parametri di "cattiveria" dell'incastro
            const minGap = -20; // Permette sovrapposizione negativa (morsicatura dei bordi)
            const tolerance = 0.85; // Fattore di strizzamento (più basso = più sovrapposizione)

            patches.forEach(p => {
                const base = p.type === 'thumbnail' ? 300 : 200;
                p.w = base + Math.random() * 200;
                p.h = base + Math.random() * 300;
            });

            const sorted = [...patches].sort(() => Math.random() - 0.5);

            sorted.forEach((patch) => {
                let radius = 0;
                let angle = Math.random() * Math.PI * 2;
                let found = false;

                // 1. Posizionamento iniziale meno restrittivo
                while (!found) {
                    let tx = centerX + Math.cos(angle) * radius - patch.w/2;
                    let ty = centerY + Math.sin(angle) * radius - patch.h/2;
                    
                    // La collisione ora ignora i margini piccoli
                    const collision = placedRects.some(r => 
                        tx < r.x + r.w * tolerance && tx + patch.w * tolerance > r.x &&
                        ty < r.y + r.h * tolerance && ty + patch.h * tolerance > r.y
                    );

                    if (!collision || radius > 4000) {
                        patch.x = tx;
                        patch.y = ty;
                        found = true;
                    } else {
                        radius += 5; // Passi più larghi per rompere lo schema spirale
                        angle += 0.1;
                    }
                }

                // 2. FASE DI STRIZZAMENTO BRUTALE
                // Spingiamo ignorando la fisica perfetta
                for (let i = 0; i < 30; i++) {
                    let dirX = (centerX - (patch.x + patch.w/2)) * 0.15;
                    let dirY = (centerY - (patch.y + patch.h/2)) * 0.15;
                    
                    let nextX = patch.x + dirX;
                    let nextY = patch.y + dirY;

                    // Qui la macchina "spinge" anche se c'è un contatto parziale
                    const deepCollision = placedRects.some(r => 
                        nextX < r.x + r.w * 0.7 && nextX + patch.w * 0.7 > r.x &&
                        nextY < r.y + r.h * 0.7 && nextY + patch.h * 0.7 > r.y
                    );

                    if (!deepCollision) {
                        patch.x = nextX;
                        patch.y = nextY;
                    }
                }

                placedRects.push({x: patch.x, y: patch.y, w: patch.w, h: patch.h});
                
                patch.el.style.width = patch.w + "px";
                patch.el.style.height = patch.h + "px";
                patch.el.style.left = patch.x + "px";
                patch.el.style.top = patch.y + "px";

                if (patch.type === 'crop') {
                    patch.imgEl.style.left = `-${Math.random() * 1000}px`;
                    patch.imgEl.style.top = `-${Math.random() * 1000}px`;
                }
            });
        }

        function physicsLoop() {
            if (!isDragging) {
                offset.x += velocity.x;
                offset.y += velocity.y;
                velocity.x *= friction;
                velocity.y *= friction;
                updateTransform();
            }
            requestAnimationFrame(physicsLoop);
        }

        function updateTransform() {
            world.style.transform = `translate3d(${offset.x}px, ${offset.y}px, 0)`;
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            isDragging = true;
            mouseDownTime = Date.now();
            startPos = { x: e.clientX, y: e.clientY };
            lastMouse = { x: e.clientX, y: e.clientY };
            velocity = { x: 0, y: 0 };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            offset.x += dx; 
            offset.y += dy;
            velocity.x = dx; 
            velocity.y = dy;
            lastMouse.x = e.clientX; 
            lastMouse.y = e.clientY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.onload = () => {
            initMosaico();
            physicsLoop();
        };

        window.onresize = () => {
            offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
            updateTransform();
        };
    </script>
</body>
</html>
