<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI — studio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #1a1a1a; /* Sfondo scuro per far risaltare la luce */
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
  }

  /* RULLINI */
  #rullino-h, #rullino-v {
    position: fixed; z-index: 100;
    background: rgba(26, 26, 26, 0.9);
    backdrop-filter: blur(5px);
  }
  #rullino-h {
    top: 0; left: 140px; right: 0; height: 140px;
    border-bottom: 1px solid #333;
    display: flex; align-items: center; padding: 0 16px; gap: 12px;
    overflow-x: auto;
  }
  #rullino-v {
    left: 0; top: 0; bottom: 0; width: 140px;
    border-right: 1px solid #333;
    overflow-y: auto; padding: 16px 10px;
  }
  #rullino-h img, #rullino-v img {
    height: 100px; width: auto; flex-shrink: 0; cursor: pointer;
    filter: grayscale(1) opacity(0.5); transition: 0.5s;
  }
  #rullino-v img { width: 100%; height: auto; margin-bottom: 10px; }
  #rullino-h img:hover, #rullino-v img:hover { filter: grayscale(0) opacity(1); }

  /* IL TAVOLO MATERICO */
  #tavolo {
    position: fixed;
    left: 0; top: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
    z-index: 5;
    /* Texture materica (simil legno/carta scura) */
    background: 
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 80%),
      url('https://www.transparenttextures.com/patterns/dark-matter.png');
  }

  /* FASCIO DI LUCE */
  #luce {
    position: absolute;
    top: -50%; left: -20%;
    width: 150%; height: 200%;
    background: conic-gradient(from 150deg at 50% 0%, transparent 0%, rgba(255,245,220,0.08) 10%, transparent 20%);
    pointer-events: none;
    z-index: 6;
    filter: blur(40px);
  }

  /* PULVISCOLO */
  #pulviscolo {
    position: absolute;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 7;
  }

  .granello {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0;
    animation: fluttua 15s infinite linear;
  }

  @keyframes fluttua {
    0% { transform: translate(0, 0); opacity: 0; }
    20% { opacity: 0.2; }
    80% { opacity: 0.2; }
    100% { transform: translate(100px, -100px); opacity: 0; }
  }

  #superficie {
    position: absolute;
    width: 4000px; height: 4000px;
  }

  .foglio {
    position: absolute;
    background: #fff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Ombra profonda per la luce */
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
  }
  .foglio img { display: block; width: 100%; height: auto; }

  #shuffle {
    position: fixed; bottom: 28px; right: 32px; z-index: 200;
    background: transparent; border: 1px solid #444; color: #666;
    font-family: 'Courier New', monospace; font-size: 8px;
    letter-spacing: 0.3em; padding: 8px 14px; cursor: pointer;
  }

  nav {
    position: fixed; bottom: 28px; left: 152px; z-index: 200;
    font-size: 9px; letter-spacing: 0.2em;
  }
  nav a { display: block; color: #444; text-decoration: none; margin-bottom: 5px; }
  nav a:hover { color: #888; }
</style>
</head>
<body>

<div id="rullino-v"></div>
<div id="rullino-h"></div>

<div id="tavolo">
  <div id="luce"></div>
  <div id="pulviscolo"></div>
  <div id="superficie"></div>
</div>

<button id="shuffle" onclick="cheAltro()">che altro?</button>

<nav>
  <a href="/">&#x25A1;</a>
  <a href="/blues-rosa">blues rosa</a>
  <a href="/bitless-mirage">bitless / mirage</a>
  <a href="/matrice">matrice</a>
</nav>

<script>
const TOTALE = 20;
const IN_FIERI = ['19a']; 
const finiti = Array.from({length: TOTALE}, (_, i) => `${i+1}.jpg`);
const infieri = IN_FIERI.map(f => `${f}.jpg`);

const superficie = document.getElementById('superficie');
let pos = {x: (window.innerWidth - 140) / 2, y: (window.innerHeight - 140) / 2};

// Creazione pulviscolo
const pulviscolo = document.getElementById('pulviscolo');
for (let i = 0; i < 50; i++) {
    const g = document.createElement('div');
    g.className = 'granello';
    g.style.left = Math.random() * 100 + '%';
    g.style.top = Math.random() * 100 + '%';
    g.style.animationDelay = Math.random() * 15 + 's';
    pulviscolo.appendChild(g);
}

function mettiSulTavolo(src) {
    // Ogni volta che scegli un disegno, lo poggiamo al centro della luce
    const foglio = document.createElement('div');
    foglio.className = 'foglio';
    const w = 400 + Math.random() * 100;
    
    // Lo mettiamo vicino al centro della visuale attuale
    const x = 2000 - pos.x + (window.innerWidth / 2) - (w / 2) + (Math.random() - 0.5) * 100;
    const y = 2000 - pos.y + (window.innerHeight / 2) - 200 + (Math.random() - 0.5) * 100;
    const rot = (Math.random() - 0.5) * 4;

    foglio.style.cssText = `width:${w}px; left:${x}px; top:${y}px; transform:rotate(${rot}deg); opacity:0;`;
    
    const img = document.createElement('img');
    img.src = src;
    foglio.appendChild(img);
    superficie.appendChild(foglio);

    setTimeout(() => { foglio.style.opacity = '1'; }, 50);

    // Click sul foglio per toglierlo (lo "archiviamo")
    foglio.onclick = () => {
        foglio.style.opacity = '0';
        foglio.style.transform += ' scale(0.9)';
        setTimeout(() => foglio.remove(), 800);
    };
}

function cheAltro() {
    // Svuota tutto con un effetto dissolvenza
    const fogli = document.querySelectorAll('.foglio');
    fogli.forEach(f => {
        f.style.opacity = '0';
        setTimeout(() => f.remove(), 800);
    });
}

// Drag del tavolo
let drag = false, last = {x:0, y:0};
window.onmousedown = e => {
    if (e.target.closest('#rullino-v') || e.target.closest('#rullino-h') || e.target.id === 'shuffle') return;
    drag = true; last = {x:e.clientX, y:e.clientY};
};
window.onmousemove = e => {
    if (!drag) return;
    pos.x += e.clientX - last.x; pos.y += e.clientY - last.y;
    last = {x:e.clientX, y:e.clientY};
    superficie.style.transform = `translate3d(${pos.x}px,${pos.y}px,0)`;
};
window.onmouseup = () => drag = false;

// Rullini
const addThumb = (f, dest) => {
    const img = document.createElement('img');
    img.src = `disegni/${f}`;
    img.onclick = () => mettiSulTavolo(img.src);
    img.onerror = () => img.remove();
    dest.appendChild(img);
};
finiti.reverse().forEach(f => addThumb(f, document.getElementById('rullino-v')));
infieri.forEach(f => addThumb(f, document.getElementById('rullino-h')));

superficie.style.transform = `translate3d(${pos.x}px,${pos.y}px,0)`;
</script>
</body>
</html>
