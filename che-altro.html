<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI — che altro?</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #f5f2ec;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
  }

  #rullino-h {
    position: fixed;
    top: 0; left: 140px; right: 0;
    height: 140px;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    overflow-x: auto;
    overflow-y: hidden;
    z-index: 10;
    background: #f5f2ec;
  }

  #rullino-h img {
    height: 100px;
    width: auto;
    flex-shrink: 0;
    cursor: pointer;
    filter: grayscale(1) brightness(0.7);
    transition: filter 0.3s;
  }

  #rullino-h img:hover { filter: none; }

  #rullino-v {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 140px;
    border-right: 1px solid #ddd;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 10px;
    z-index: 10;
    background: #f5f2ec;
  }

  #rullino-v img {
    display: block;
    width: 100%;
    margin-bottom: 10px;
    cursor: pointer;
    filter: grayscale(1) brightness(0.7);
    transition: filter 0.3s;
  }

  #rullino-v img:hover { filter: none; }

  #tavolo {
    position: fixed;
    left: 140px; top: 140px;
    right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }

  #tavolo:active { cursor: grabbing; }

  #superficie {
    position: absolute;
    width: 4000px; height: 4000px;
    top: -2000px; left: -2000px;
  }

 .foglio {
    position: absolute;
    background: #fff;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03); 
    border: 1px solid rgba(0,0,0,0.02);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .foglio img {
    display: block;
    width: 100%;
    height: auto;
    filter: brightness(0.98);
  }

  .foglio.focus-mode {
    box-shadow: none;
    border: 1px solid #eee;
  }

  #shuffle {
    position: fixed;
    bottom: 28px; right: 32px;
    z-index: 20;
    background: transparent;
    border: 1px solid #ccc;
    color: #aaa;
    font-family: 'Courier New', monospace;
    font-size: 8px;
    letter-spacing: 0.3em;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.3s;
  }

  #shuffle:hover { color: #333; border-color: #999; }

  nav {
    position: fixed;
    bottom: 28px; left: 152px;
    z-index: 20;
    font-size: 9px;
    letter-spacing: 0.2em;
    line-height: 2;
  }

  nav a {
    display: block;
    color: rgba(0,0,0,0.2);
    text-decoration: none;
  }

  nav a:hover { color: rgba(0,0,0,0.6); }
</style>
</head>
<body>

<div id="rullino-v"></div>
<div id="rullino-h"></div>

<div id="tavolo">
  <div id="superficie"></div>
</div>

<!-- Pulsante con il nome dell'azione -->
<button id="shuffle" onclick="cheAltro()">che altro?</button>

<nav>
  <a href="/">&#x25A1;</a>
  <a href="/blues-rosa">blues rosa</a>
  <a href="/bitless-mirage">bitless / mirage</a>
  <a href="/matrice">matrice</a>
</nav>

<script>
// ── CONFIGURAZIONE ───────────────────────────────────────
const TOTALE = 20;
const IN_FIERI = ['19a']; 
// ─────────────────────────────────────────────────────────

const finiti = Array.from({length: TOTALE}, (_, i) => `${i+1}.jpg`);
const infieri = IN_FIERI.map(f => `${f}.jpg`);
const archivioCompleto = [...finiti, ...infieri];

const rullinoV = document.getElementById('rullino-v');
const rullinoH = document.getElementById('rullino-h');
const superficie = document.getElementById('superficie');

let modalitaFocus = false;
let fogliInPausa = [];
let pos = {x: (window.innerWidth - 140) / 2, y: (window.innerHeight - 140) / 2};

// 1. FUNZIONE FOCUS
function mettiSulTavolo(src) {
    if (modalitaFocus) ritornaAlTavolo(); 
    modalitaFocus = true;
    fogliInPausa = document.querySelectorAll('.foglio');
    
    fogliInPausa.forEach(f => {
        f.style.opacity = '0';
        f.style.pointerEvents = 'none';
    });

    const foglioEsame = document.createElement('div');
    foglioEsame.className = 'foglio focus-mode';
    
    const w = 500; 
    const x = 2000 - pos.x + (window.innerWidth - 140) / 2 - (w/2); 
    const y = 2000 - pos.y + (window.innerHeight - 140) / 2 - 300;

    foglioEsame.style.cssText = `width:${w}px; left:${x}px; top:${y}px; z-index:9999; opacity:0; transform:scale(0.98);`;

    const img = document.createElement('img');
    img.src = src;
    foglioEsame.appendChild(img);
    superficie.appendChild(foglioEsame);

    foglioEsame.onclick = (e) => {
        e.stopPropagation();
        ritornaAlTavolo(foglioEsame);
    };

    setTimeout(() => {
        foglioEsame.style.opacity = '1';
        foglioEsame.style.transform = 'scale(1)';
    }, 50);
}

// 2. FUNZIONE RITORNO
function ritornaAlTavolo(foglioDaRimuovere) {
    modalitaFocus = false;
    if (foglioDaRimuovere) {
        foglioDaRimuovere.style.opacity = '0';
        setTimeout(() => foglioDaRimuovere.remove(), 400);
    }
    fogliInPausa.forEach(f => {
        f.style.opacity = '1';
        f.style.pointerEvents = 'auto';
    });
}

// 3. LA FUNZIONE "CHE ALTRO?" (Masonry 3+2)
function cheAltro() {
    modalitaFocus = false;
    superficie.innerHTML = '';
    
    const NUMERO_FOGLI = 5;
    const sel = [...archivioCompleto].sort(() => Math.random() - 0.5).slice(0, NUMERO_FOGLI);
    
    const gapX = 360; 
    const gapY = 400; 
    const w = 300;
    
    const offsetInizialeX = 2000; 
    const offsetInizialeY = 1750; 

    sel.forEach((f, idx) => {
        const foglio = document.createElement('div');
        foglio.className = 'foglio';
        const img = document.createElement('img');
        img.src = `disegni/${f}`;
        foglio.appendChild(img);
        
        let x, y;

        if (idx < 3) {
            // Riga sopra: 3 fogli
            x = offsetInizialeX - gapX + (idx * gapX) - (w / 2);
            y = offsetInizialeY;
        } else {
            // Riga sotto: 2 fogli centrati
            x = offsetInizialeX - (gapX / 2) + ((idx - 3) * gapX) - (w / 2);
            y = offsetInizialeY + gapY;
        }

        foglio.style.cssText = `
            width: ${w}px; 
            left: ${x}px; 
            top: ${y}px; 
            z-index: ${idx}; 
            transform: rotate(0deg); 
            opacity: 1;
        `;
        
        foglio.onclick = () => mettiSulTavolo(`disegni/${f}`);
        superficie.appendChild(foglio);
    });
}

// 4. INIZIALIZZAZIONE RULLINI
[...finiti].reverse().forEach(f => {
    const img = document.createElement('img');
    img.src = `disegni/${f}`;
    img.className = 'thumb';
    img.onclick = () => mettiSulTavolo(img.src);
    img.onerror = () => img.remove();
    rullinoV.appendChild(img);
});

infieri.forEach(f => {
    const img = document.createElement('img');
    img.src = `disegni/${f}`;
    img.className = 'thumb';
    img.onclick = () => mettiSulTavolo(img.src);
    img.onerror = () => img.remove();
    rullinoH.appendChild(img);
});

// 5. MOVIMENTO TAVOLO
let drag = false, last = {x:0,y:0};
document.getElementById('tavolo').onmousedown = e => { 
    if(e.target.id === 'tavolo' || e.target.id === 'superficie') {
        drag = true; last = {x:e.clientX, y:e.clientY}; 
    }
};
window.onmousemove = e => {
    if (!drag) return;
    pos.x += e.clientX - last.x; pos.y += e.clientY - last.y;
    last = {x:e.clientX, y:e.clientY};
    superficie.style.transform = `translate3d(${pos.x}px,${pos.y}px,0)`;
};
window.onmouseup = () => drag = false;

// 6. AVVIO AL CARICAMENTO
superficie.style.transform = `translate3d(${pos.x}px,${pos.y}px,0)`;
cheAltro();
</script>
</body>
</html>
