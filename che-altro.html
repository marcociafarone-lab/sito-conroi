<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI — studio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100%; height: 100%;
    background: #000;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
  }

  /* RULLINI */
  #rullino-h, #rullino-v {
    position: fixed; z-index: 100;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    transition: background 0.8s;
  }
  #rullino-h { top: 0; left: 140px; right: 0; height: 140px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; padding: 0 16px; gap: 12px; overflow-x: auto; }
  #rullino-v { left: 0; top: 0; bottom: 0; width: 140px; border-right: 1px solid rgba(255,255,255,0.05); overflow-y: auto; padding: 16px 10px; }
  
  #rullino-h img, #rullino-v img {
    height: 100px; width: auto; flex-shrink: 0; cursor: pointer;
    filter: grayscale(1) contrast(1.2) opacity(0.4); transition: 0.5s;
  }
  #rullino-v img { width: 100%; height: auto; margin-bottom: 10px; }
  #rullino-h img:hover, #rullino-v img:hover { filter: grayscale(0) opacity(1); }

  /* IL TAVOLO CON LA TUA FOTO */
  #tavolo {
    position: fixed; left: 0; top: 0; right: 0; bottom: 0;
    overflow: hidden; cursor: grab; z-index: 5;
    background-color: #1a1a1a;
    /* SOSTITUISCI 'tavolo.jpg' CON IL TUO FILE */
    background-image: url('tavolo.jpg'); 
    background-size: 1500px; /* Regola in base alla risoluzione della tua foto */
    background-repeat: repeat;
  }

  /* ATMOSFERE DI LUCE */
  #overlay-luce {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 6;
    transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Luce 1: Pomeriggio Caldo */
  .luce-calda {
    background: 
      radial-gradient(circle at 30% 20%, rgba(255, 200, 100, 0.15) 0%, transparent 60%),
      linear-gradient(135deg, rgba(255, 150, 50, 0.05) 0%, rgba(0,0,0,0.6) 80%);
  }

  /* Luce 2: Neon Notturno / Lampada Fredda */
  .luce-fredda {
    background: 
      radial-gradient(circle at 70% 30%, rgba(150, 200, 255, 0.2) 0%, transparent 50%),
      linear-gradient(20deg, rgba(0,0,0,0.8) 0%, rgba(50, 70, 100, 0.1) 100%);
  }

  /* PULVISCOLO */
  #pulviscolo { position: absolute; inset: 0; pointer-events: none; z-index: 7; }
  .granello {
    position: absolute; width: 1px; height: 1px; background: white; border-radius: 50%; opacity: 0;
    animation: fluttua 20s infinite linear;
  }
  @keyframes fluttua {
    0% { transform: translate(0, 0); opacity: 0; }
    50% { opacity: 0.15; }
    100% { transform: translate(150px, -150px); opacity: 0; }
  }

  #superficie { position: absolute; width: 4000px; height: 4000px; }

  .foglio {
    position: absolute; background: #fff;
    box-shadow: 0 15px 45px rgba(0,0,0,0.4);
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
  }
  .foglio img { display: block; width: 100%; height: auto; }

  #btn-luce {
    position: fixed; bottom: 28px; right: 32px; z-index: 200;
    background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.4);
    font-family: 'Courier New', monospace; font-size: 8px;
    letter-spacing: 0.3em; padding: 8px 14px; cursor: pointer;
  }
  #btn-luce:hover { color: #fff; border-color: #fff; }

  nav { position: fixed; bottom: 28px; left: 152px; z-index: 200; font-size: 9px; letter-spacing: 0.2em; }
  nav a { display: block; color: rgba(255,255,255,0.2); text-decoration: none; margin-bottom: 5px; }
</style>
</head>
<body>

<div id="rullino-v"></div>
<div id="rullino-h"></div>

<div id="tavolo">
  <div id="overlay-luce" class="luce-calda"></div>
  <div id="pulviscolo"></div>
  <div id="superficie"></div>
</div>

<button id="btn-luce" onclick="cambiaLuce()">che altro?</button>

<nav>
  <a href="/">&#x25A1;</a>
  <a href="/blues-rosa">blues rosa</a>
  <a href="/bitless-mirage">bitless / mirage</a>
  <a href="/matrice">matrice</a>
</nav>

<script>
const TOTALE = 20;
const IN_FIERI = ['19a']; 
const finiti = Array.from({length: TOTALE}, (_, i) => `${i+1}.jpg`);
const infieri = IN_FIERI.map(f => `${f}.jpg`);

const superficie = document.getElementById('superficie');
const overlayLuce = document.getElementById('overlay-luce');
let pos = {x: (window.innerWidth - 140) / 2, y: (window.innerHeight - 140) / 2};

// Ciclo delle luci
let tipoLuce = 0;
function cambiaLuce() {
    tipoLuce = (tipoLuce + 1) % 2;
    if (tipoLuce === 0) {
        overlayLuce.className = 'luce-calda';
    } else {
        overlayLuce.className = 'luce-fredda';
    }
}

// Pulviscolo
const pulviscolo = document.getElementById('pulviscolo');
for (let i = 0; i < 40; i++) {
    const g = document.createElement('div');
    g.className = 'granello';
    g.style.left = Math.random() * 100 + '%';
    g.style.top = Math.random() * 100 + '%';
    g.style.animationDelay = Math.random() * 20 + 's';
    pulviscolo.appendChild(g);
}

function mettiSulTavolo(src) {
    const foglio = document.createElement('div');
    foglio.className = 'foglio';
    const w = 350 + Math.random() * 100;
    
    const x = 2000 - pos.x + (window.innerWidth / 2) - (w / 2) + (Math.random() - 0.5) * 60;
    const y = 2000 - pos.y + (window.innerHeight / 2) - 200 + (Math.random() - 0.5) * 60;
    const rot = (Math.random() - 0.5) * 6;

    foglio.style.cssText = `width:${w}px; left:${x}px; top:${y}px; transform:rotate(${rot}deg); opacity:0;`;
    
    const img = document.createElement('img');
    img.src = src;
    foglio.appendChild(img);
    superficie.appendChild(foglio);

    setTimeout(() => { foglio.style.opacity = '1'; }, 50);

    foglio.onclick = () => {
        foglio.style.opacity = '0';
        setTimeout(() => foglio.remove(), 600);
    };
}

// Drag
let drag = false, last = {x:0, y:0};
window.onmousedown = e => {
    if (e.target.closest('#rullino-v') || e.target.closest('#rullino-h') || e.target.id === 'btn-luce') return;
    drag = true; last = {x:e.clientX, y:e.clientY};
};
window.onmousemove = e => {
    if (!drag) return;
    pos.x += e.clientX - last.x; pos.y += e.clientY - last.y;
    last = {x:e.clientX, y:e.clientY};
    superficie.style.transform = `translate3d(${pos.x}px,${pos.y}px,0)`;
};
window.onmouseup = () => drag = false;

// Rullini
const addThumb = (f, dest) => {
    const img = document.createElement('img');
    img.src = `disegni/${f}`;
    img.onclick = () => mettiSulTavolo(img.src);
    img.onerror = () => img.remove();
    dest.appendChild(img);
};
finiti.reverse().forEach(f => addThumb(f, document.getElementById('rullino-v')));
infieri.forEach(f => addThumb(f, document.getElementById('rullino-h')));

superficie.style.transform = `translate3d(${pos.x}px,${pos.y}px,0)`;
</script>
</body>
</html>
