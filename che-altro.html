<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Che Altro - Calamita Centripeta</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: grab;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body:active { cursor: grabbing; }

        #world {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            will-change: transform;
        }

        #viewport {
            position: absolute;
            width: 12000px;
            height: 12000px;
            top: -6000px;
            left: -6000px;
            display: block;
        }

        .patch-container {
            position: absolute;
            overflow: hidden;
            background-color: #050505;
            /* Linea sottile di separazione */
            border: 1px solid #0a0a0a; 
            cursor: pointer;
            margin: 0; 
            box-sizing: border-box;
            transition: all 1.2s cubic-bezier(0.2, 1, 0.3, 1), opacity 0.5s ease;
        }

        .patch-item {
            position: absolute;
            filter: grayscale(1) brightness(0.35) contrast(1.2);
            transition: filter 0.8s ease, opacity 1s ease;
            opacity: 0;
            pointer-events: none;
            max-width: none;
        }

        .patch-item.thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            top: 0 !important;
            left: 0 !important;
        }

        .patch-item.crop {
            width: auto;
            height: auto;
        }

        .patch-item.loaded { 
            opacity: 1; 
        }

        .patch-container:hover {
            z-index: 100;
            border-color: #333;
        }

        .patch-container:hover .patch-item {
            filter: grayscale(0) brightness(1) contrast(1.1);
        }

        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            display: none;
            justify-content: center; align-items: center;
            z-index: 10000;
            cursor: zoom-out;
        }

        #modal img { 
            max-width: 95%; 
            max-height: 95%; 
            object-fit: contain; 
        }

        #ui-layer {
            position: fixed;
            top: 35px; left: 35px;
            pointer-events: none; z-index: 1000;
        }

        .label { font-size: 9px; letter-spacing: 5px; color: #444; text-transform: uppercase; }
        .title { color: #888; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }
        
        #shuffle-btn {
            position: fixed;
            top: 35px; right: 35px;
            background: transparent;
            border: 1px solid #222;
            color: #444;
            padding: 8px 15px;
            font-family: inherit;
            font-size: 9px;
            letter-spacing: 3px;
            cursor: pointer;
            z-index: 1001;
            pointer-events: auto;
            transition: all 0.3s;
        }

        #shuffle-btn:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.05); }
        #instruction { position: fixed; bottom: 35px; right: 35px; font-size: 8px; color: #222; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="label">Archivio Centripeto</div>
        <div class="title">Che Altro</div>
    </div>

    <button id="shuffle-btn" onclick="shuffleMosaico()">CALAMITA / SHUFFLE</button>

    <div id="instruction">MARGINE SOTTILE / MIX ICONA + CROP</div>

    <div id="world">
        <div id="viewport"></div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="full-image" src="">
    </div>

    <script>
        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const modal = document.getElementById('modal');
        const fullImg = document.getElementById('full-image');

        let fileCount = 20; 
        let offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let velocity = { x: 0, y: 0 };
        let isDragging = false;
        let mouseDownTime = 0;
        let startPos = { x: 0, y: 0 };
        let lastMouse = { x: 0, y: 0 };
        const friction = 0.95;

        let patches = [];

        function initMosaico() {
            viewport.innerHTML = '';
            patches = [];
            
            for (let i = 1; i <= fileCount; i++) {
                createPatch(i, 'thumbnail');
                createPatch(i, 'crop');
            }
            
            shuffleMosaico();
        }

        function createPatch(fileIndex, type) {
            const imgSrc = `disegni/${fileIndex}.jpg`;
            const container = document.createElement('div');
            container.className = 'patch-container';

            const img = document.createElement('img');
            img.className = `patch-item ${type}`;
            img.src = imgSrc;

            img.onload = () => img.classList.add('loaded');
            img.onerror = () => container.style.display = 'none';

            container.addEventListener('mouseup', (e) => {
                const duration = Date.now() - mouseDownTime;
                const dist = Math.hypot(e.clientX - startPos.x, e.clientY - startPos.y);
                if (duration < 250 && dist < 10) {
                    fullImg.src = imgSrc;
                    modal.style.display = 'flex';
                }
            });

            container.appendChild(img);
            viewport.appendChild(container);
            
            patches.push({
                el: container,
                imgEl: img,
                type: type,
                width: 0,
                height: 0
            });
        }

        function shuffleMosaico() {
            velocity = { x: 0, y: 0 };
            const centerX = 6000;
            const centerY = 6000;
            
            const placedRects = [];
            const shuffledPatches = [...patches].sort(() => Math.random() - 0.5);

            // Margine minimo tra le tessere (linea sottile)
            const gap = 2; 

            shuffledPatches.forEach((patch) => {
                const w = patch.type === 'thumbnail' ? 280 : (180 + Math.random() * 240);
                const h = patch.type === 'thumbnail' ? 280 : (180 + Math.random() * 320);
                
                let foundPosition = false;
                let radius = 0;
                let angle = Math.random() * Math.PI * 2;
                let finalX = centerX;
                let finalY = centerY;

                while (!foundPosition) {
                    finalX = centerX + Math.cos(angle) * radius - w/2;
                    finalY = centerY + Math.sin(angle) * radius - h/2;

                    const currentRect = { x: finalX, y: finalY, w: w, h: h };
                    
                    // Controllo sovrapposizione includendo il gap
                    const overlaps = placedRects.some(r => 
                        currentRect.x < r.x + r.w + gap &&
                        currentRect.x + currentRect.w + gap > r.x &&
                        currentRect.y < r.y + r.h + gap &&
                        currentRect.y + currentRect.h + gap > r.y
                    );

                    if (!overlaps) {
                        foundPosition = true;
                        placedRects.push(currentRect);
                    } else {
                        radius += 6; 
                        angle += 0.2;
                    }
                }

                patch.el.style.width = w + "px";
                patch.el.style.height = h + "px";
                patch.el.style.left = finalX + "px";
                patch.el.style.top = finalY + "px";

                if (patch.type === 'crop') {
                    patch.imgEl.style.left = `-${Math.random() * 800}px`;
                    patch.imgEl.style.top = `-${Math.random() * 800}px`;
                }
            });
        }

        function physicsLoop() {
            if (!isDragging) {
                offset.x += velocity.x;
                offset.y += velocity.y;
                velocity.x *= friction;
                velocity.y *= friction;
                updateTransform();
            }
            requestAnimationFrame(physicsLoop);
        }

        function updateTransform() {
            world.style.transform = `translate3d(${offset.x}px, ${offset.y}px, 0)`;
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            isDragging = true;
            mouseDownTime = Date.now();
            startPos = { x: e.clientX, y: e.clientY };
            lastMouse = { x: e.clientX, y: e.clientY };
            velocity = { x: 0, y: 0 };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            offset.x += dx; 
            offset.y += dy;
            velocity.x = dx; 
            velocity.y = dy;
            lastMouse.x = e.clientX; 
            lastMouse.y = e.clientY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        window.onload = () => {
            initMosaico();
            physicsLoop();
        };

        window.onresize = () => {
            offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
            updateTransform();
        };
    </script>
</body>
</html>
