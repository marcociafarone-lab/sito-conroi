<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CONROI — studio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-color: #f7f7f8;
    --border-color: #e5e5e5;
    --sidebar-w: 140px;
    --rullino-h-mobile: 110px; /* Altezza fissa rullino basso */
  }

  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-color); position: fixed; }

  body { display: flex; font-family: 'Courier New', Courier, monospace; user-select: none; }

  /* SIDEBAR DESKTOP */
  #container-v {
    width: var(--sidebar-w); height: 100%;
    border-right: 1px solid var(--border-color); background: var(--bg-color);
    z-index: 100; flex-shrink: 0; display: flex; flex-direction: column;
  }
  #rullino-v { flex-grow: 1; overflow-y: auto; padding: 15px 10px; scrollbar-width: none; }
  #rullino-v::-webkit-scrollbar { display: none; }
  #rullino-v img { width: 100%; height: auto; margin-bottom: 12px; cursor: pointer; filter: grayscale(1) opacity(0.5); transition: 0.3s; }
  #rullino-v img:hover { filter: none; opacity: 1; }

  /* TAVOLO */
  #main-content { flex-grow: 1; height: 100%; position: relative; overflow: hidden; background: #eee; }
  #tavolo-texture { position: absolute; inset: 0; background-image: url('tavolo.jpg'); background-size: cover; background-position: center; }
  #superficie { position: absolute; inset: 0; z-index: 5; }

  /* FOGLIO BIANCO */
  .foglio {
    position: absolute; background: #fff; padding: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: opacity 0.4s ease;
    cursor: pointer; z-index: 50; display: flex; align-items: center; justify-content: center;
  }
  .foglio img { display: block; max-width: 100%; max-height: 100%; object-fit: contain; }

  nav {
    position: fixed; bottom: 20px; left: calc(var(--sidebar-w) + 24px);
    z-index: 200; font-size: 9px; letter-spacing: 0.2em;
  }
  nav a { display: block; color: #ccc; text-decoration: none; margin-bottom: 4px; }

  /* --- MOBILE FIXES --- */
  @media (max-width: 768px) {
    /* VERTICALE */
    @media (orientation: portrait) {
      body { flex-direction: column; }
      #container-v { 
        order: 2; width: 100%; height: var(--rullino-h-mobile); 
        border-right: none; border-top: 1px solid var(--border-color); 
      }
      #rullino-v { 
        flex-direction: row; overflow-x: auto; overflow-y: hidden; 
        padding: 0 10px; gap: 10px; white-space: nowrap; 
      }
      #rullino-v img { height: 75px; width: auto; margin-bottom: 0; flex-shrink: 0; }
      #main-content { height: calc(100% - var(--rullino-h-mobile)); }
      nav { bottom: calc(var(--rullino-h-mobile) + 20px); left: 20px; }
    }

    /* ORIZZONTALE */
    @media (orientation: landscape) {
      #container-v { width: 85px; }
      #rullino-v img { margin-bottom: 8px; }
      nav { left: 105px; bottom: 15px; }
    }
  }
</style>
</head>
<body>

<div id="container-v">
  <div id="rullino-v"></div>
</div>

<div id="main-content">
  <div id="tavolo-texture"></div>
  <div id="superficie"></div>
  <nav>
    <a href="/">&#x25A1;</a>
    <a href="/blues-rosa">blues rosa</a>
    <a href="/bitless-mirage">bitless / mirage</a>
    <a href="/matrice">matrice</a>
  </nav>
</div>

<script>
const TOTALE = 20;
const finiti = Array.from({length: TOTALE}, (_, i) => `${i+1}.jpg`);
const superficie = document.getElementById('superficie');
const rv = document.getElementById('rullino-v');

function mettiSulTavolo(src) {
    const foglio = document.createElement('div');
    foglio.className = 'foglio';
    
    const isMobile = window.innerWidth < 768;
    const isPortrait = window.innerHeight > window.innerWidth;

    let w, hMax;

    if (isMobile) {
        if (isPortrait) {
            w = window.innerWidth * 0.85;
            hMax = "55vh"; // Non copre il rullino basso
        } else {
            w = window.innerWidth * 0.45;
            hMax = "70vh"; // Sta nel poco spazio verticale del landscape
        }
    } else {
        w = 550 + Math.random() * 150;
        hMax = "82vh";
    }

    const rot = (Math.random() - 0.5) * 6;
    
    foglio.style.cssText = `
        left: 50%; top: 50%; 
        transform: translate(-50%, -50%) rotate(${rot}deg); 
        opacity: 0; width: ${w}px; 
        max-height: ${hMax};
    `;

    const img = document.createElement('img');
    img.src = src;
    // La nitidezza è garantita da queste due righe
    img.style.maxWidth = "100%";
    img.style.maxHeight = "100%";
    img.style.objectFit = "contain";

    foglio.appendChild(img);
    superficie.appendChild(foglio);
    
    setTimeout(() => { foglio.style.opacity = '1'; }, 50);
    
    foglio.onclick = (e) => { 
        e.stopPropagation(); 
        foglio.style.opacity = '0'; 
        setTimeout(() => foglio.remove(), 400); 
    };
}

const addThumb = (f, dest) => {
    const img = document.createElement('img');
    img.src = `disegni/${f}`;
    img.onclick = (e) => { e.stopPropagation(); mettiSulTavolo(img.src); };
    img.onerror = () => img.remove();
    dest.appendChild(img);
};

[...finiti].reverse().forEach(f => addThumb(f, rv));
</script>
</body>
</html>
