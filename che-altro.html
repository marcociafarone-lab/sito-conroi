<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Che Altro - Mosaico di Segni</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: grab;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body:active { cursor: grabbing; }

        #world {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            will-change: transform;
        }

        #viewport {
            position: absolute;
            width: 15000px;
            height: 15000px;
            top: -7500px;
            left: -7500px;
        }

        .patch-container {
            position: absolute;
            overflow: hidden;
            background-color: #050505;
            border: 0.5px solid rgba(255,255,255,0.05); /* Sottile linea di giunzione */
            cursor: pointer;
        }

        .patch-item {
            width: auto; height: auto;
            min-width: 100%; min-height: 100%;
            object-fit: none;
            /* EFFETTO NEGATIVO E BIANCO E NERO DI DEFAULT */
            filter: invert(1) grayscale(1) brightness(0.8);
            transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
            display: block;
            pointer-events: none;
            opacity: 0;
        }

        .patch-item.loaded { opacity: 1; }

        /* AL PASSAGGIO DEL MOUSE TORNA ORIGINALE */
        .patch-container:hover .patch-item {
            filter: invert(0) grayscale(0) brightness(1);
            z-index: 10;
        }

        /* MODAL PER INGRANDIMENTO */
        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none; /* Nascosto all'inizio */
            justify-content: center; align-items: center;
            z-index: 10000;
            cursor: zoom-out;
        }

        #modal img { 
            max-width: 90%; 
            max-height: 90%; 
            object-fit: contain; 
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* INTERFACCIA */
        #ui-layer {
            position: fixed;
            top: 35px; left: 35px;
            pointer-events: none; z-index: 1000;
        }

        .label { font-size: 9px; letter-spacing: 5px; color: #333; text-transform: uppercase; }
        .title { color: #555; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }
        #instruction { position: fixed; bottom: 35px; right: 35px; font-size: 8px; color: #222; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="label">Frammenti / Piano Solo</div>
        <div class="title">Che Altro</div>
    </div>

    <div id="instruction">TRASCINA IL TESSUTO / CLICCA IL FRAMMENTO</div>

    <div id="world">
        <div id="viewport"></div>
    </div>

    <!-- ELEMENTO PER INGRANDIMENTO -->
    <div id="modal" onclick="this.style.display='none'">
        <img id="full-image" src="">
    </div>

    <script>
        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const modal = document.getElementById('modal');
        const fullImg = document.getElementById('full-image');

        const artworks = [
            'disegni/1.jpg', 'disegni/2.jpg', 'disegni/3.jpg', 'disegni/4.jpg',
            'disegni/5.jpg', 'disegni/6.jpg', 'disegni/7.jpg', 'disegni/8.jpg',
            'disegni/9.jpg', 'disegni/10.jpg', 'disegni/11.jpg', 'disegni/12.jpg', 'disegni/13.jpg'
        ];

        let offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let isDragging = false;
        let startMouse = { x: 0, y: 0 };
        let dragStartTime = 0;

        function init() {
            const columnWidth = 350; 
            const columns = 4;       
            const columnHeights = new Array(columns).fill(0);

            artworks.forEach((imgSrc, i) => {
                const container = document.createElement('div');
                container.className = 'patch-container';
                
                const shortestColumn = columnHeights.indexOf(Math.min(...columnHeights));
                
                const w = columnWidth;
                const h = 250 + (i % 3) * 120; 

                const x = 7500 + (shortestColumn * w);
                const y = 7500 + columnHeights[shortestColumn];

                container.style.width = `${w}px`;
                container.style.height = `${h}px`;
                container.style.left = `${x}px`;
                container.style.top = `${y}px`;

                columnHeights[shortestColumn] += h;

                const img = document.createElement('img');
                img.className = 'patch-item';
                img.src = imgSrc;
                img.style.objectPosition = `${Math.random() * 100}% ${Math.random() * 100}%`;

                img.onload = () => img.classList.add('loaded');
                img.onerror = () => container.remove();

                // FUNZIONE CLIC PER INGRANDIRE
                container.onclick = (e) => {
                    // Evita l'apertura se l'utente stava trascinando
                    const now = Date.now();
                    if (now - dragStartTime > 200) return;
                    
                    fullImg.src = imgSrc;
                    modal.style.display = 'flex';
                };

                container.appendChild(img);
                viewport.appendChild(container);
            });
            updateTransform();
        }

        window.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStartTime = Date.now();
            startMouse.x = e.clientX - offset.x;
            startMouse.y = e.clientY - offset.y;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            offset.x = e.clientX - startMouse.x;
            offset.y = e.clientY - startMouse.y;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        function updateTransform() {
            world.style.transform = `translate(${offset.x}px, ${offset.y}px)`;
        }

        window.onresize = updateTransform;
        init();
    </script>
</body>
</html>
