<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI — che altro</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #080808;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    color: #444;
  }

  /* Rullino verticale — finiti */
  #rullino-v {
    position: fixed;
    left: 0; top: 160px; bottom: 0;
    width: 120px;
    overflow-y: auto;
    overflow-x: hidden;
    border-right: 1px solid #111;
    padding: 16px 8px;
    z-index: 10;
  }

  #rullino-v img {
    display: block;
    width: 100%;
    margin-bottom: 10px;
    cursor: pointer;
    filter: grayscale(1) brightness(0.4);
    transition: filter 0.3s;
  }

  #rullino-v img:hover { filter: grayscale(0) brightness(1); }

  /* Rullino orizzontale — in fieri */
  #rullino-h {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 160px;
    overflow-x: auto;
    overflow-y: hidden;
    border-bottom: 1px solid #111;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    z-index: 10;
  }

  #rullino-h img {
    height: 120px;
    width: auto;
    cursor: pointer;
    filter: grayscale(1) brightness(0.3);
    transition: filter 0.3s;
    flex-shrink: 0;
  }

  #rullino-h img:hover { filter: grayscale(0) brightness(0.8); }

  /* Tavolo */
  #tavolo {
    position: fixed;
    left: 120px; top: 160px;
    right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }

  #tavolo:active { cursor: grabbing; }

  #superficie {
    position: absolute;
    width: 4000px; height: 4000px;
    top: -2000px; left: -2000px;
  }

  .foglio {
    position: absolute;
    box-shadow: 8px 12px 30px rgba(0,0,0,0.9);
  }

  .foglio img {
    display: block;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.5);
    transition: filter 0.4s;
  }

  .foglio:hover img { filter: brightness(1); }

  /* Modal */
  #modal {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    cursor: zoom-out;
  }

  #modal img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
  }

  /* Shuffle */
  #shuffle {
    position: fixed;
    bottom: 28px; right: 32px;
    z-index: 20;
    background: transparent;
    border: 1px solid #1a1a1a;
    color: #333;
    font-family: 'Courier New', monospace;
    font-size: 8px;
    letter-spacing: 0.3em;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.3s;
  }

  #shuffle:hover { color: #fff; border-color: #444; }

  /* Nav */
  nav {
    position: fixed;
    bottom: 28px; left: 32px;
    z-index: 20;
    font-size: 9px;
    letter-spacing: 0.2em;
    line-height: 2;
  }

  nav a {
    display: block;
    color: rgba(255,255,255,0.15);
    text-decoration: none;
  }

  nav a:hover { color: rgba(255,255,255,0.5); }
</style>
</head>
<body>

<div id="rullino-h"></div>
<div id="rullino-v"></div>

<div id="tavolo">
  <div id="superficie"></div>
</div>

<button id="shuffle" onclick="scuoti()">scuoti</button>

<div id="modal" onclick="this.style.display='none'">
  <img id="modal-img" src="">
</div>

<nav>
  <a href="/">&#x25A1;</a>
  <a href="/blues-rosa">blues rosa</a>
  <a href="/bitless-mirage">bitless / mirage</a>
  <a href="/matrice">matrice</a>
</nav>

<script>
// ─── UNICO PARAMETRO DA AGGIORNARE ───
const TOTALE = 20; // numero totale dei disegni finiti
// ─────────────────────────────────────

// Costruisce la lista file automaticamente
// Finiti: 1.jpg, 2.jpg, ... TOTALE.jpg
// In fieri: qualsiasi file con lettera es. 1a.jpg, 2b.jpg
// Aggiungili manualmente a questa lista se presenti:
const IN_FIERI = ['1a', '3a', '6a', '10a']; // ← aggiorna con le tue lettere

const finiti = Array.from({length: TOTALE}, (_, i) => `${i+1}.jpg`);
const infieri = IN_FIERI.map(f => `${f}.jpg`);

const rullinoV = document.getElementById('rullino-v');
const rullinoH = document.getElementById('rullino-h');
const superficie = document.getElementById('superficie');

function apri(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal').style.display = 'flex';
}

// Popola i rullini
finiti.forEach(f => {
  const img = document.createElement('img');
  img.src = `disegni/${f}`;
  img.onclick = () => apri(img.src);
  img.onerror = () => img.remove();
  rullinoV.appendChild(img);
});

infieri.forEach(f => {
  const img = document.createElement('img');
  img.src = `disegni/${f}`;
  img.onclick = () => apri(img.src);
  img.onerror = () => img.remove();
  rullinoH.appendChild(img);
});

// Scuoti — mette sul tavolo i più recenti
function scuoti() {
  superficie.innerHTML = '';

  const sel_finiti = [...finiti].reverse().slice(0, 5);
  const sel_infieri = [...infieri].reverse().slice(0, 4);
  const selezione = [...sel_finiti, ...sel_infieri]
    .sort(() => Math.random() - 0.5);

  const cx = 2000, cy = 2000;
  const piazzati = [];

  selezione.forEach((f, idx) => {
    const foglio = document.createElement('div');
    foglio.className = 'foglio';

    const img = document.createElement('img');
    img.src = `disegni/${f}`;
    foglio.appendChild(img);
    foglio.onclick = () => apri(`disegni/${f}`);

    const w = 280 + Math.random() * 200;
    const h = w * (0.75 + Math.random() * 0.5);
    const rot = (Math.random() - 0.5) * 12;

    let x, y, r = 0, a = Math.random() * Math.PI * 2;
    do {
      x = cx + Math.cos(a) * r - w / 2;
      y = cy + Math.sin(a) * r - h / 2;
      const col = piazzati.some(p =>
        x < p.x + p.w * 0.7 && x + w * 0.7 > p.x &&
        y < p.y + p.h * 0.7 && y + h * 0.7 > p.y
      );
      if (!col || r > 1200) break;
      r += 10; a += 0.15;
    } while (true);

    piazzati.push({x, y, w, h});

    foglio.style.cssText = `
      width:${w}px; height:${h}px;
      left:${x}px; top:${y}px;
      z-index:${idx};
      transform:rotate(${rot}deg);
    `;

    superficie.appendChild(foglio);
  });
}

// Navigazione tavolo
const tavolo = document.getElementById('tavolo');
let drag = false, last = {x:0, y:0};
let pos = {x: window.innerWidth/2, y: window.innerHeight/2};

tavolo.addEventListener('mousedown', e => {
  drag = true;
  last = {x: e.clientX, y: e.clientY};
});

window.addEventListener('mousemove', e => {
  if (!drag) return;
  pos.x += e.clientX - last.x;
  pos.y += e.clientY - last.y;
  last = {x: e.clientX, y: e.clientY};
  superficie.style.transform = `translate3d(${pos.x}px,${pos.y}px,0)`;
});

window.addEventListener('mouseup', () => drag = false);

scuoti();
</script>

</body>
</html>
