<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Che Altro - Studio & Cantiere</title>
    <style>
        :root {
            --sidebar-v-width: 250px;
            --sidebar-h-height: 180px;
            --bg-color: #080808;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: #555;
        }

        /* --- SIDEBAR VERTICALE (FINITI) --- */
        #rullino-v {
            position: fixed;
            left: 0; top: var(--sidebar-h-height); bottom: 0;
            width: var(--sidebar-v-width);
            background: #040404;
            border-right: 1px solid #151515;
            overflow-y: auto;
            z-index: 100;
            padding: 20px 0;
        }

        /* --- SIDEBAR ORIZZONTALE (IN-FIERI) --- */
        #cantiere-h {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--sidebar-h-height);
            background: #060606;
            border-bottom: 1px solid #151515;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            z-index: 101;
            padding: 10px 20px;
            display: flex;
            align-items: center;
        }

        .thumb {
            cursor: pointer;
            filter: grayscale(1) brightness(0.5);
            transition: all 0.3s;
            border: 1px solid #111;
        }

        .thumb:hover { filter: grayscale(0) brightness(1); border-color: #444; }

        .v-item { width: 80%; margin: 0 auto 20px; display: block; }
        .h-item { height: 80%; margin-right: 15px; display: inline-block; }

        /* --- TAVOLO --- */
        #workspace {
            position: absolute;
            left: var(--sidebar-v-width);
            top: var(--sidebar-h-height);
            right: 0; bottom: 0;
            background: var(--bg-color);
            overflow: hidden;
            cursor: grab;
        }

        #table-surface {
            position: absolute;
            width: 4000px; height: 4000px;
            top: -2000px; left: -2000px;
        }

        .sheet {
            position: absolute;
            background: #111;
            box-shadow: 12px 18px 35px rgba(0,0,0,0.9);
            transition: all 0.9s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .sheet img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); transition: 0.5s; }
        .sheet:hover img { filter: brightness(1); }

        /* Tag identificativo per il non-finito */
        .sheet.in-fieri::after {
            content: "IN-FIERI";
            position: absolute;
            top: 5px; right: 5px;
            font-size: 7px;
            letter-spacing: 1px;
            color: #444;
            background: rgba(0,0,0,0.5);
            padding: 2px 4px;
        }

        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none;
            justify-content: center; align-items: center;
            z-index: 10000; cursor: zoom-out;
        }
        #modal img { max-width: 90%; max-height: 90%; }

        .btn-ui {
            position: fixed; bottom: 30px; right: 30px;
            z-index: 500; background: transparent; border: 1px solid #222;
            color: #444; padding: 10px; font-size: 8px; letter-spacing: 3px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-ui:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>

    <div id="cantiere-h"></div>
    <div id="rullino-v"></div>

    <div id="workspace">
        <div id="table-surface"></div>
    </div>

    <button class="btn-ui" onclick="scatterTable()">SCUOTI TAVOLO</button>

    <div id="modal" onclick="this.style.display='none'">
        <img id="full-img" src="">
    </div>

    <script>
        // Simuliamo i file. In produzione questa lista sarebbe generata dal server o definita manualmente.
        const files = [
            "1.jpg", "1a.jpg", "2.jpg", "3.jpg", "3a.jpg", "4.jpg", "5.jpg", 
            "6.jpg", "6a.jpg", "7.jpg", "8.jpg", "9.jpg", "10.jpg", "10a.jpg"
        ];

        const rullinoV = document.getElementById('rullino-v');
        const cantiereH = document.getElementById('cantiere-h');
        const table = document.getElementById('table-surface');

        function init() {
            files.forEach(f => {
                const isInfieri = /[a-z]/.test(f);
                const img = document.createElement('img');
                img.src = `disegni/${f}`;
                img.className = isInfieri ? 'thumb h-item' : 'thumb v-item';
                img.onclick = () => { document.getElementById('full-img').src = img.src; document.getElementById('modal').style.display='flex'; };
                
                if(isInfieri) cantiereH.appendChild(img);
                else rullinoV.appendChild(img);
            });
            scatterTable();
        }

        function scatterTable() {
            table.innerHTML = '';
            const centerX = 2000;
            const centerY = 2000;
            const placed = [];

            // L'Algo sceglie 5 finiti e 5 in-fieri casuali per il tavolo
            const finiti = files.filter(f => !/[a-z]/.test(f)).sort(() => 0.5 - Math.random()).slice(0, 6);
            const infieri = files.filter(f => /[a-z]/.test(f)).sort(() => 0.5 - Math.random()).slice(0, 4);
            const selection = [...finiti, ...infieri];

            selection.forEach((f, idx) => {
                const sheet = document.createElement('div');
                const isInfieri = /[a-z]/.test(f);
                sheet.className = isInfieri ? 'sheet in-fieri' : 'sheet';
                
                const w = isInfieri ? 220 + Math.random()*100 : 300 + Math.random()*200;
                const h = w * (0.8 + Math.random()*0.4);

                let found = false;
                let r = 0, angle = Math.random() * Math.PI * 2;
                let x, y;

                while(!found) {
                    x = centerX + Math.cos(angle) * r - w/2;
                    y = centerY + Math.sin(angle) * r - h/2;
                    const overlap = placed.some(p => 
                        x < p.x + p.w * 0.75 && x + w * 0.75 > p.x &&
                        y < p.y + p.h * 0.75 && y + h * 0.75 > p.y
                    );
                    if(!overlap || r > 1500) found = true;
                    else { r += 12; angle += 0.15; }
                }

                placed.push({x, y, w, h});
                sheet.style.cssText = `width:${w}px; height:${h}px; left:${x}px; top:${y}px; z-index:${idx}; transform:rotate(${(Math.random()-0.5)*10}deg)`;
                sheet.innerHTML = `<img src="disegni/${f}">`;
                sheet.onclick = () => { document.getElementById('full-img').src = `disegni/${f}`; document.getElementById('modal').style.display='flex'; };
                table.appendChild(sheet);
            });
        }

        // Navigazione tavolo
        let isDragging = false, offset = {x: window.innerWidth/2, y: window.innerHeight/2}, lastM = {x:0, y:0};
        const ws = document.getElementById('workspace');
        ws.onmousedown = (e) => { isDragging = true; lastM = {x:e.clientX, y:e.clientY}; };
        window.onmousemove = (e) => {
            if(!isDragging) return;
            offset.x += e.clientX - lastM.x; offset.y += e.clientY - lastM.y;
            lastM = {x:e.clientX, y:e.clientY};
            table.style.transform = `translate3d(${offset.x}px, ${offset.y}px, 0)`;
        };
        window.onmouseup = () => isDragging = false;

        init();
    </script>
</body>
</html>
