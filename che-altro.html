<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI — che altro</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #f5f2ec;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
  }

  #rullino-h {
    position: fixed;
    top: 0; left: 140px; right: 0;
    height: 140px;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    overflow-x: auto;
    overflow-y: hidden;
    z-index: 10;
    background: #f5f2ec;
  }

  #rullino-h img {
    height: 100px;
    width: auto;
    flex-shrink: 0;
    cursor: pointer;
    filter: grayscale(1) brightness(0.7);
    transition: filter 0.3s;
  }

  #rullino-h img:hover { filter: none; }

  #rullino-v {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 140px;
    border-right: 1px solid #ddd;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 10px;
    z-index: 10;
    background: #f5f2ec;
  }

  #rullino-v img {
    display: block;
    width: 100%;
    margin-bottom: 10px;
    cursor: pointer;
    filter: grayscale(1) brightness(0.7);
    transition: filter 0.3s;
  }

  #rullino-v img:hover { filter: none; }

  #tavolo {
    position: fixed;
    left: 140px; top: 140px;
    right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }

  #tavolo:active { cursor: grabbing; }

  #superficie {
    position: absolute;
    width: 4000px; height: 4000px;
    top: -2000px; left: -2000px;
  }

  .foglio {
    position: absolute;
    box-shadow: 4px 8px 20px rgba(0,0,0,0.15);
  }

  .foglio img {
    display: block;
    width: 100%; height: 100%;
    object-fit: cover;
    transition: filter 0.3s;
  }

  .foglio:hover img { filter: brightness(1.05); }

  #modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    cursor: zoom-out;
  }

  #modal img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
  }

  #shuffle {
    position: fixed;
    bottom: 28px; right: 32px;
    z-index: 20;
    background: transparent;
    border: 1px solid #ccc;
    color: #aaa;
    font-family: 'Courier New', monospace;
    font-size: 8px;
    letter-spacing: 0.3em;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.3s;
  }

  #shuffle:hover { color: #333; border-color: #999; }

  nav {
    position: fixed;
    bottom: 28px; left: 152px;
    z-index: 20;
    font-size: 9px;
    letter-spacing: 0.2em;
    line-height: 2;
  }

  nav a {
    display: block;
    color: rgba(0,0,0,0.2);
    text-decoration: none;
  }

  nav a:hover { color: rgba(0,0,0,0.6); }
</style>
</head>
<body>

<div id="rullino-v"></div>
<div id="rullino-h"></div>

<div id="tavolo">
  <div id="superficie"></div>
</div>

<button id="shuffle" onclick="scuoti()">scuoti</button>

<div id="modal" onclick="this.style.display='none'">
  <img id="modal-img" src="">
</div>

<nav>
  <a href="/">&#x25A1;</a>
  <a href="/blues-rosa">blues rosa</a>
  <a href="/bitless-mirage">bitless / mirage</a>
  <a href="/matrice">matrice</a>
</nav>

<script>
// ── aggiorna solo questi due ──────────────────
const TOTALE = 20;
const IN_FIERI = ['19a'];
// ─────────────────────────────────────────────

const finiti = Array.from({length: TOTALE}, (_, i) => `${i+1}.jpg`);
const infieri = IN_FIERI.map(f => `${f}.jpg`);

const rullinoV = document.getElementById('rullino-v');
const rullinoH = document.getElementById('rullino-h');
const superficie = document.getElementById('superficie');

function apri(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal').style.display = 'flex';
}

finiti.forEach(f => {
  const img = document.createElement('img');
  img.src = `disegni/${f}`;
  img.onclick = () => apri(img.src);
  img.onerror = () => img.remove();
  rullinoV.appendChild(img);
});

infieri.forEach(f => {
  const img = document.createElement('img');
  img.src = `disegni/${f}`;
  img.onclick = () => apri(img.src);
  img.onerror = () => img.remove();
  rullinoH.appendChild(img);
});

function scuoti() {
  superficie.innerHTML = '';

  const sel = [...finiti.slice(-5), ...infieri]
    .sort(() => Math.random() - 0.5);

  const cx = 2000, cy = 2000;
  const piazzati = [];

  sel.forEach((f, idx) => {
    const foglio = document.createElement('div');
    foglio.className = 'foglio';
    const img = document.createElement('img');
    img.src = `disegni/${f}`;
    foglio.appendChild(img);
    foglio.onclick = () => apri(`disegni/${f}`);

    const w = 260 + Math.random() * 180;
    const h = w * (0.75 + Math.random() * 0.45);
    const rot = (Math.random() - 0.5) * 10;

    let x, y, r = 0, a = Math.random() * Math.PI * 2;
    while (true) {
      x = cx + Math.cos(a) * r - w / 2;
      y = cy + Math.sin(a) * r - h / 2;
      const col = piazzati.some(p =>
        x < p.x + p.w * 0.65 && x + w * 0.65 > p.x &&
        y < p.y + p.h * 0.65 && y + h * 0.65 > p.y
      );
      if (!col || r > 1200) break;
      r += 10; a += 0.15;
    }

    piazzati.push({x, y, w, h});
    foglio.style.cssText = `width:${w}px;height:${h}px;left:${x}px;top:${y}px;z-index:${idx};transform:rotate(${rot}deg);`;
    superficie.appendChild(foglio);
  });
}

const tavolo = document.getElementById('tavolo');
let drag = false, last = {x:0,y:0};
let pos = {x: (window.innerWidth - 140) / 2, y: (window.innerHeight - 140) / 2};
superficie.style.transform = `translate3d(${pos.x}px,${pos.y}px,0)`;

tavolo.addEventListener('mousedown', e => { drag = true; last = {x:e.clientX,y:e.clientY}; });
window.addEventListener('mousemove', e => {
  if (!drag) return;
  pos.x += e.clientX - last.x;
  pos.y += e.clientY - last.y;
  last = {x:e.clientX,y:e.clientY};
  superficie.style.transform = `translate3d(${pos.x}px,${pos.y}px,0)`;
});
window.addEventListener('mouseup', () => drag = false);

scuoti();
</script>
</body>
</html>
