<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CONROI — studio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-color: #f7f7f8;
    --border-color: #e5e5e5;
    --sidebar-width: 140px;
    --h-rullino: 120px;
  }

  /* Impediamo lo scroll molesto su mobile */
  html, body { 
    width: 100%; 
    height: 100%; 
    position: fixed; 
    overflow: hidden; 
    background: var(--bg-color);
  }

  body {
    display: flex;
    font-family: 'Courier New', Courier, monospace;
    user-select: none;
  }

  /* --- DESKTOP SETUP --- */
  #container-v {
    width: var(--sidebar-width);
    height: 100%;
    border-right: 1px solid var(--border-color);
    background: var(--bg-color);
    z-index: 100;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  #rullino-v {
    flex-grow: 1;
    overflow-y: auto;
    padding: 16px 10px;
    scrollbar-width: none;
  }
  #rullino-v::-webkit-scrollbar { display: none; }
  #rullino-v img { width: 100%; height: auto; margin-bottom: 12px; cursor: pointer; filter: grayscale(1) opacity(0.5); transition: 0.3s; }
  #rullino-v img:hover { filter: none; opacity: 1; }

  #main-content {
    flex-grow: 1;
    position: relative;
    background: #eee;
    overflow: hidden;
  }

  #tavolo-texture { position: absolute; inset: 0; background-image: url('tavolo.jpg'); background-size: cover; background-position: center; }
  #superficie { position: absolute; inset: 0; z-index: 5; }

  .foglio {
    position: absolute; background: #fff; padding: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06); transition: opacity 0.4s ease;
    cursor: pointer; z-index: 50; display: flex; align-items: center; justify-content: center;
  }
  .foglio img { display: block; max-width: 100%; max-height: 100%; object-fit: contain; }

  nav {
    position: fixed; bottom: 20px; left: calc(var(--sidebar-width) + 24px);
    z-index: 200; font-size: 9px; letter-spacing: 0.2em;
  }
  nav a { display: block; color: #ccc; text-decoration: none; margin-bottom: 4px; }

  /* --- MOBILE FIX DEFINITIVO --- */
  @media (max-width: 768px) {
    body { flex-direction: column; }

    /* Verticale: Rullino in basso */
    @media (orientation: portrait) {
      #container-v {
        order: 2;
        width: 100%;
        height: var(--h-rullino);
        border-right: none;
        border-top: 1px solid var(--border-color);
      }
      #rullino-v {
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        align-items: center;
        padding: 0 10px;
        gap: 12px;
      }
      #rullino-v img { height: 80px; width: auto; margin-bottom: 0; }
      #main-content { height: calc(100% - var(--h-rullino)); }
      nav { bottom: calc(var(--h-rullino) + 20px); left: 20px; }
    }

    /* Orizzontale: Rullino a sinistra */
    @media (orientation: landscape) {
      body { flex-direction: row; }
      #container-v { width: 90px; height: 100%; border-right: 1px solid var(--border-color); }
      #rullino-v { flex-direction: column; overflow-y: auto; overflow-x: hidden; }
      #rullino-v img { width: 100%; height: auto; margin-bottom: 10px; }
      nav { left: 110px; bottom: 20px; }
    }
  }
</style>
</head>
<body>

<div id="container-v">
  <div id="rullino-v"></div>
</div>

<div id="main-content">
  <div id="tavolo-texture"></div>
  <div id="superficie"></div>
  
  <nav>
    <a href="/">&#x25A1;</a>
    <a href="/blues-rosa">blues rosa</a>
    <a href="/bitless-mirage">bitless / mirage</a>
    <a href="/matrice">matrice</a>
  </nav>
</div>

<script>
const TOTALE = 20;
const finiti = Array.from({length: TOTALE}, (_, i) => `${i+1}.jpg`);
const superficie = document.getElementById('superficie');
const rv = document.getElementById('rullino-v');

function mettiSulTavolo(src) {
    const foglio = document.createElement('div');
    foglio.className = 'foglio';
    
    const isMobile = window.innerWidth < 768;
    const isPortrait = window.innerHeight > window.innerWidth;

    let w;
    if (isMobile) {
        w = isPortrait ? (window.innerWidth * 0.85) : (window.innerWidth * 0.45);
    } else {
        w = 550 + Math.random() * 150;
    }

    const rot = (Math.random() - 0.5) * 6;
    
    foglio.style.cssText = `
        left: 50%; top: 50%; 
        transform: translate(-50%, -50%) rotate(${rot}deg); 
        opacity: 0; width: ${w}px; 
        max-height: ${isMobile && isPortrait ? '55vh' : '80vh'};
    `;

    const img = document.createElement('img');
    img.src = src;
    img.style.maxWidth = "100%";
    img.style.maxHeight = "100%";
    img.style.objectFit = "contain";

    foglio.appendChild(img);
    superficie.appendChild(foglio);
    
    setTimeout(() => { foglio.style.opacity = '1'; }, 50);
    
    foglio.onclick = (e) => { 
        e.stopPropagation(); 
        foglio.style.opacity = '0'; 
        setTimeout(() => foglio.remove(), 400); 
    };
}

const addThumb = (f, dest) => {
    const img = document.createElement('img');
    img.src = `disegni/${f}`;
    img.onclick = (e) => { e.stopPropagation(); mettiSulTavolo(img.src); };
    img.onerror = () => img.remove();
    dest.appendChild(img);
};

[...finiti].reverse().forEach(f => addThumb(f, rv));
</script>
</body>
</html>
