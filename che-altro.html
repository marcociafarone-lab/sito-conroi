<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Che Altro - Mosaico di Segni</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: grab;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body:active { cursor: grabbing; }

        #world {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            will-change: transform;
        }

        #viewport {
            position: absolute;
            width: 15000px;
            height: 15000px;
            top: -7500px;
            left: -7500px;
        }

        .patch-container {
            position: absolute;
            overflow: hidden;
            background-color: #050505;
            border: 0.5px solid rgba(255,255,255,0.05);
            cursor: pointer;
            /* Transizione fluida per la randomizzazione */
            transition: left 0.8s cubic-bezier(0.7, 0, 0.3, 1), 
                        top 0.8s cubic-bezier(0.7, 0, 0.3, 1),
                        width 0.8s cubic-bezier(0.7, 0, 0.3, 1),
                        height 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .patch-item {
            width: auto; 
            height: auto;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            filter: invert(0) grayscale(0);
            transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity 0.8s ease,
                        transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
            display: block;
            pointer-events: none;
            opacity: 0;
            image-rendering: -webkit-optimize-contrast; 
        }

        .patch-item.loaded { opacity: 1; }

        .patch-container:hover .patch-item {
            filter: invert(1) grayscale(1);
            z-index: 10;
        }

        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center; align-items: center;
            z-index: 10000;
            cursor: zoom-out;
        }

        #modal img { 
            max-width: 90%; 
            max-height: 90%; 
            object-fit: contain; 
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        #ui-layer {
            position: fixed;
            top: 35px; left: 35px;
            pointer-events: none; z-index: 1000;
        }

        .label { font-size: 9px; letter-spacing: 5px; color: #333; text-transform: uppercase; }
        .title { color: #555; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }
        
        #shuffle-btn {
            position: fixed;
            top: 35px; right: 35px;
            background: transparent;
            border: 1px solid #222;
            color: #444;
            padding: 8px 15px;
            font-family: inherit;
            font-size: 9px;
            letter-spacing: 3px;
            cursor: pointer;
            z-index: 1001;
            pointer-events: auto;
            transition: all 0.3s ease;
        }

        #shuffle-btn:hover {
            border-color: #666;
            color: #eee;
            background: #111;
        }

        #instruction { position: fixed; bottom: 35px; right: 35px; font-size: 8px; color: #222; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="label">Frammenti / Piano Solo</div>
        <div class="title">Che Altro</div>
    </div>

    <button id="shuffle-btn" onclick="reshuffle()">RESHUFFLE</button>

    <div id="instruction">FLUTTUA SUL TESSUTO / CLICCA IL FRAMMENTO</div>

    <div id="world">
        <div id="viewport"></div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="full-image" src="">
    </div>

    <script>
        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const modal = document.getElementById('modal');
        const fullImg = document.getElementById('full-image');

        const artworks = [
            'disegni/1.jpg', 'disegni/2.jpg', 'disegni/3.jpg', 'disegni/4.jpg',
            'disegni/5.jpg', 'disegni/6.jpg', 'disegni/7.jpg', 'disegni/8.jpg',
            'disegni/9.jpg', 'disegni/10.jpg', 'disegni/11.jpg', 'disegni/12.jpg', 'disegni/13.jpg'
        ];

        let offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let velocity = { x: 0, y: 0 };
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        let dragStartTime = 0;
        const friction = 0.95;

        function init() {
            // Creazione iniziale senza ritardi
            artworks.forEach((imgSrc, i) => {
                const container = document.createElement('div');
                container.className = 'patch-container';
                
                // Assegniamo una posizione temporanea lontana dalla vista
                container.style.left = "-2000px"; 
                
                const img = document.createElement('img');
                img.className = 'patch-item';
                img.src = imgSrc;

                img.onload = () => {
                    img.classList.add('loaded');
                    // Ogni volta che un'immagine carica, ricalcoliamo per compattare
                    reshuffle(); 
                };

                img.onerror = () => container.remove();

                container.onclick = (e) => {
                    if (Math.abs(velocity.x) > 2 || Math.abs(velocity.y) > 2) return;
                    const now = Date.now();
                    if (now - dragStartTime > 200) return;
                    fullImg.src = imgSrc;
                    modal.style.display = 'flex';
                };

                container.appendChild(img);
                viewport.appendChild(container);
            });
            
            // Primo rimescolamento forzato
            reshuffle();
            requestAnimationFrame(physicsLoop);
        }

        function applyRandomLayout(container, img) {
            const w = 350;
            // Range di altezza casuale coerente
            const h = 250 + Math.random() * 300;
            
            container.style.width = `${w}px`;
            container.style.height = `${h}px`;

            if (img.complete && img.naturalWidth) {
                const extraX = img.naturalWidth - w;
                const extraY = img.naturalHeight - h;
                const shiftX = extraX > 0 ? (Math.random() * 0.8 + 0.1) * extraX : 0;
                const shiftY = extraY > 0 ? (Math.random() * 0.8 + 0.1) * extraY : 0;
                img.style.transform = `translate3d(${-shiftX}px, ${-shiftY}px, 0)`;
            }
        }

        function reshuffle() {
            const containers = document.querySelectorAll('.patch-container');
            if (containers.length === 0) return;

            const columnWidth = 350;
            const columns = 4;
            const columnHeights = new Array(columns).fill(0);

            containers.forEach((container) => {
                const img = container.querySelector('.patch-item');
                
                const shortestColumn = columnHeights.indexOf(Math.min(...columnHeights));
                
                const x = 7500 + (shortestColumn * columnWidth);
                const y = 7500 + columnHeights[shortestColumn];

                // Imposta dimensioni e calcola l'altezza prima di assegnare la posizione
                if (!container.style.height || container.style.height === "0px") {
                    applyRandomLayout(container, img);
                }

                container.style.left = `${x}px`;
                container.style.top = `${y}px`;

                columnHeights[shortestColumn] += parseInt(container.style.height) || 0;
            });
        }

        function physicsLoop() {
            if (!isDragging) {
                offset.x += velocity.x;
                offset.y += velocity.y;
                velocity.x *= friction;
                velocity.y *= friction;
                updateTransform();
            }
            requestAnimationFrame(physicsLoop);
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            isDragging = true;
            dragStartTime = Date.now();
            lastMouse.x = e.clientX;
            lastMouse.y = e.clientY;
            velocity = { x: 0, y: 0 };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            offset.x += dx;
            offset.y += dy;
            velocity.x = dx;
            velocity.y = dy;
            lastMouse.x = e.clientX;
            lastMouse.y = e.clientY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        function updateTransform() {
            world.style.transform = `translate3d(${offset.x}px, ${offset.y}px, 0)`;
        }

        window.onresize = () => {
            offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
            updateTransform();
        };

        init();
    </script>
</body>
</html>
