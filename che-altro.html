<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Che Altro - Archivio Fogli Sparsi</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: grab;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body:active { cursor: grabbing; }

        #world {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            will-change: transform;
        }

        #viewport {
            position: absolute;
            width: 12000px;
            height: 12000px;
            top: -6000px;
            left: -6000px;
            display: block;
        }

        .patch-container {
            position: absolute;
            overflow: hidden;
            background-color: #111;
            /* Ombra per dare l'effetto foglio sovrapposto */
            box-shadow: 0 4px 15px rgba(0,0,0,0.8), 0 0 1px rgba(255,255,255,0.1);
            border: 0.5px solid rgba(255,255,255,0.05); 
            cursor: pointer;
            box-sizing: border-box;
            transition: transform 0.8s cubic-bezier(0.2, 0, 0, 1), 
                        top 0.8s cubic-bezier(0.2, 0, 0, 1), 
                        left 0.8s cubic-bezier(0.2, 0, 0, 1), 
                        opacity 0.5s ease;
        }

        .patch-item {
            position: absolute;
            width: 100%;
            height: 100%;
            /* Garantisce che l'immagine riempia sempre il contenitore senza spazi vuoti */
            object-fit: cover; 
            filter: grayscale(1) brightness(0.4) contrast(1.2);
            transition: filter 0.6s ease, opacity 1s ease;
            opacity: 0;
            pointer-events: none;
        }

        .patch-item.loaded { 
            opacity: 1; 
        }

        .patch-container:hover {
            z-index: 9000 !important;
            border-color: rgba(255,255,255,0.3);
            filter: brightness(1.1);
            /* Al passaggio del mouse si raddrizza leggermente */
            transform: scale(1.05) rotate(0deg) !important;
        }

        .patch-container:hover .patch-item {
            filter: grayscale(0) brightness(1) contrast(1.1);
        }

        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            justify-content: center; align-items: center;
            z-index: 10000;
            cursor: zoom-out;
        }

        #modal img { 
            max-width: 90%; 
            max-height: 90%; 
            object-fit: contain; 
        }

        #ui-layer {
            position: fixed;
            top: 40px; left: 40px;
            pointer-events: none; z-index: 2000;
        }

        .label { font-size: 8px; letter-spacing: 6px; color: #444; text-transform: uppercase; }
        .title { color: #888; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; }
        
        #shuffle-btn {
            position: fixed;
            top: 40px; right: 40px;
            background: transparent;
            border: 1px solid #222;
            color: #555;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 8px;
            letter-spacing: 4px;
            cursor: pointer;
            z-index: 2001;
            pointer-events: auto;
            transition: all 0.4s;
            outline: none;
        }

        #shuffle-btn:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.05); }
        #instruction { position: fixed; bottom: 40px; right: 40px; font-size: 7px; color: #333; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="label">Accumulo Gravitazionale</div>
        <div class="title">Che Altro</div>
    </div>

    <button id="shuffle-btn" onclick="shuffleMosaico()">LANCIA FOGLI</button>

    <div id="instruction">FOGLI SPARSI / SOVRAPPOSIZIONE MATERICA</div>

    <div id="world">
        <div id="viewport"></div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="full-image" src="">
    </div>

    <script>
        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const modal = document.getElementById('modal');
        const fullImg = document.getElementById('full-image');

        let fileCount = 20; 
        let offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let velocity = { x: 0, y: 0 };
        let isDragging = false;
        let mouseDownTime = 0;
        let startPos = { x: 0, y: 0 };
        let lastMouse = { x: 0, y: 0 };
        const friction = 0.94;

        let patches = [];

        function initMosaico() {
            viewport.innerHTML = '';
            patches = [];
            for (let i = 1; i <= fileCount; i++) {
                // Creiamo due versioni per ogni immagine per aumentare la massa
                createPatch(i, 0.4); 
                createPatch(i, 0.8);
            }
            setTimeout(shuffleMosaico, 100);
        }

        function createPatch(fileIndex, scaleFactor) {
            const imgSrc = `disegni/${fileIndex}.jpg`;
            const container = document.createElement('div');
            container.className = 'patch-container';

            const img = document.createElement('img');
            img.className = `patch-item`;
            img.src = imgSrc;
            
            // Posizionamento casuale del "crop" usando object-position
            img.style.objectPosition = `${Math.random() * 100}% ${Math.random() * 100}%`;

            img.onload = () => img.classList.add('loaded');
            img.onerror = () => container.style.display = 'none';

            container.addEventListener('mouseup', (e) => {
                const duration = Date.now() - mouseDownTime;
                const dist = Math.hypot(e.clientX - startPos.x, e.clientY - startPos.y);
                if (duration < 250 && dist < 10) {
                    fullImg.src = imgSrc;
                    modal.style.display = 'flex';
                }
            });

            container.appendChild(img);
            viewport.appendChild(container);
            
            patches.push({
                el: container,
                imgEl: img,
                x: 0, y: 0, w: 0, h: 0,
                rotation: (Math.random() - 0.5) * 6 // Rotazione tra -3 e +3 gradi
            });
        }

        function shuffleMosaico() {
            velocity = { x: 0, y: 0 };
            const centerX = 6000;
            const centerY = 6000;
            const placedRects = [];
            
            // Tolleranza di incastro: permette ai fogli di scivolare uno sotto l'altro
            const overlapTension = 0.8; 

            patches.forEach(p => {
                const ratio = 0.8 + Math.random() * 0.4;
                p.w = 280 + Math.random() * 300;
                p.h = p.w * ratio;
            });

            const sorted = [...patches].sort(() => Math.random() - 0.5);

            sorted.forEach((patch, idx) => {
                let radius = 0;
                let angle = Math.random() * Math.PI * 2;
                let found = false;

                while (!found) {
                    let tx = centerX + Math.cos(angle) * radius - patch.w/2;
                    let ty = centerY + Math.sin(angle) * radius - patch.h/2;
                    
                    const collision = placedRects.some(r => 
                        tx < r.x + r.w * overlapTension && tx + patch.w * overlapTension > r.x &&
                        ty < r.y + r.h * overlapTension && ty + patch.h * overlapTension > r.y
                    );

                    if (!collision || radius > 4000) {
                        patch.x = tx;
                        patch.y = ty;
                        found = true;
                    } else {
                        radius += 8;
                        angle += 0.12;
                    }
                }

                // Strizzamento finale verso il centro
                for (let i = 0; i < 15; i++) {
                    let dx = (centerX - (patch.x + patch.w/2)) * 0.1;
                    let dy = (centerY - (patch.y + patch.h/2)) * 0.1;
                    
                    let nx = patch.x + dx;
                    let ny = patch.y + dy;

                    const col = placedRects.some(r => 
                        nx < r.x + r.w * 0.7 && nx + patch.w * 0.7 > r.x &&
                        ny < r.y + r.h * 0.7 && ny + patch.h * 0.7 > r.y
                    );

                    if (!col) {
                        patch.x = nx;
                        patch.y = ny;
                    }
                }

                placedRects.push({x: patch.x, y: patch.y, w: patch.w, h: patch.h});
                
                patch.el.style.width = patch.w + "px";
                patch.el.style.height = patch.h + "px";
                patch.el.style.left = patch.x + "px";
                patch.el.style.top = patch.y + "px";
                patch.el.style.zIndex = idx;
                patch.el.style.transform = `rotate(${patch.rotation}deg)`;
            });
        }

        function physicsLoop() {
            if (!isDragging) {
                offset.x += velocity.x;
                offset.y += velocity.y;
                velocity.x *= friction;
                velocity.y *= friction;
                updateTransform();
            }
            requestAnimationFrame(physicsLoop);
        }

        function updateTransform() {
            world.style.transform = `translate3d(${offset.x}px, ${offset.y}px, 0)`;
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            isDragging = true;
            mouseDownTime = Date.now();
            startPos = { x: e.clientX, y: e.clientY };
            lastMouse = { x: e.clientX, y: e.clientY };
            velocity = { x: 0, y: 0 };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            offset.x += dx; offset.y += dy;
            velocity.x = dx; velocity.y = dy;
            lastMouse.x = e.clientX; lastMouse.y = e.clientY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.onload = () => {
            initMosaico();
            physicsLoop();
        };

        window.onresize = () => {
            offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
            updateTransform();
        };
    </script>
</body>
</html>
