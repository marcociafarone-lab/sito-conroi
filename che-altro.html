<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI — studio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-color: #f7f7f8;
    --border-color: #e5e5e5;
    --accent-color: #1a1a1a;
    --sidebar-width: 140px;
    --header-height: 140px;
  }

  body {
    width: 100%; height: 100%;
    background: var(--bg-color);
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    display: flex;
  }

  /* RULLINO VERTICALE (SINISTRA) */
  #container-v {
    position: relative;
    width: var(--sidebar-width);
    height: 100vh;
    border-right: 1px solid var(--border-color);
    background: var(--bg-color);
    z-index: 100;
  }
  #rullino-v {
    height: 100%; overflow-y: auto; padding: 16px 10px;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  #rullino-v::-webkit-scrollbar { display: none; }

  /* RULLINO ORIZZONTALE (ALTO) */
  #main-content {
    flex-grow: 1; display: flex; flex-direction: column; height: 100vh;
  }
  #container-h {
    position: relative;
    height: var(--header-height);
    width: 100%;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-color);
    z-index: 100;
  }
  #rullino-h {
    height: 100%; display: flex; align-items: center; padding: 0 16px; gap: 12px;
    overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
  }
  #rullino-h::-webkit-scrollbar { display: none; }

  /* INDICATORI LINEA + RETTANGOLO */
  .linea-v { position: absolute; top: 0; right: 0; width: 1px; height: 100%; background: var(--border-color); }
  #rettangolo-v { position: absolute; right: -1px; width: 3px; height: 40px; background: var(--accent-color); top: 0; }

  .linea-h { position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background: var(--border-color); }
  #rettangolo-h { position: absolute; bottom: -1px; height: 3px; width: 40px; background: var(--accent-color); left: 0; }

  #rullino-h img, #rullino-v img {
    height: 100px; width: auto; flex-shrink: 0; cursor: pointer;
    filter: grayscale(1) opacity(0.5); transition: 0.3s;
  }
  #rullino-v img { width: 100%; height: auto; margin-bottom: 10px; }
  #rullino-h img:hover, #rullino-v img:hover { filter: none; opacity: 1; }

  /* IL TAVOLO INCASTONATO */
  #tavolo-container {
    flex-grow: 1; position: relative; overflow: hidden; cursor: grab; background-color: #f0f0f1;
  }
  #tavolo-texture {
    position: absolute; inset: 0; background-image: url('tavolo.jpg');
    background-size: cover; opacity: 0.3; pointer-events: none;
  }
  #superficie { position: absolute; width: 4000px; height: 4000px; top: 0; left: 0; }

  /* LUCI */
  #overlay-luce { position: absolute; inset: 0; pointer-events: none; z-index: 10; transition: background 1.5s ease; }
  .luce-calda { background: radial-gradient(circle at 30% 30%, rgba(255, 230, 150, 0.15) 0%, transparent 70%); }
  .luce-fredda { background: radial-gradient(circle at 70% 20%, rgba(180, 220, 255, 0.2) 0%, transparent 70%); }

  .foglio {
    position: absolute; background: #fff; padding: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.06); transition: opacity 0.5s ease;
    cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
  }
  .foglio img { display: block; width: 100%; height: auto; pointer-events: none; }

  /* PULSANTE "CHE ALTRO?" */
  #btn-luce {
    position: fixed; bottom: 28px; right: 32px; z-index: 200;
    background: #fff; border: 1px solid var(--border-color); color: #999;
    font-family: 'Courier New', monospace; font-size: 8px;
    letter-spacing: 0.3em; padding: 10px 16px; cursor: pointer;
  }
  #btn-luce:hover { color: #1a1a1a; border-color: #1a1a1a; }

  nav { position: fixed; bottom: 28px; left: calc(var(--sidebar-width) + 24px); z-index: 200; font-size: 9px; letter-spacing: 0.2em; }
  nav a { display: block; color: #ccc; text-decoration: none; margin-bottom: 4px; }
  nav a:hover { color: #888; }
</style>
</head>
<body>

<div id="container-v">
  <div id="rullino-v"></div>
  <div class="linea-v"><div id="rettangolo-v"></div></div>
</div>

<div id="main-content">
  <div id="container-h">
    <div id="rullino-h"></div>
    <div class="linea-h"><div id="rettangolo-h"></div></div>
  </div>
  <div id="tavolo-container">
    <div id="tavolo-texture"></div>
    <div id="superficie"></div>
    <div id="overlay-luce" class="luce-calda"></div>
  </div>
</div>

<button id="btn-luce" onclick="cambiaLuce()">che altro?</button>

<nav>
  <a href="/">&#x25A1;</a>
  <a href="/blues-rosa">blues rosa</a>
  <a href="/bitless-mirage">bitless / mirage</a>
  <a href="/matrice">matrice</a>
</nav>

<script>
const TOTALE = 20;
const IN_FIERI = ['19a']; 
const finiti = Array.from({length: TOTALE}, (_, i) => `${i+1}.jpg`);
const infieri = IN_FIERI.map(f => `${f}.jpg`);

const superficie = document.getElementById('superficie');
const overlayLuce = document.getElementById('overlay-luce');
const tavoloContainer = document.getElementById('tavolo-container');

let pos = { x: -1500, y: -1500 };
superficie.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0)`;

// LOGICA SCROLL INDICATORS (LINEA E RETTANGOLO)
const rv = document.getElementById('rullino-v');
const rh = document.getElementById('rullino-h');
const retV = document.getElementById('rettangolo-v');
const retH = document.getElementById('rettangolo-h');

rv.onscroll = () => {
    let perc = rv.scrollTop / (rv.scrollHeight - rv.clientHeight);
    retV.style.top = (perc * (rv.clientHeight - 40)) + "px";
};
rh.onscroll = () => {
    let perc = rh.scrollLeft / (rh.scrollWidth - rh.clientWidth);
    retH.style.left = (perc * (rh.clientWidth - 40)) + "px";
};

// CAMBIO LUCE
let tipoLuce = 0;
function cambiaLuce() {
    tipoLuce = (tipoLuce + 1) % 2;
    overlayLuce.className = (tipoLuce === 0) ? 'luce-calda' : 'luce-fredda';
}

function mettiSulTavolo(src) {
    const foglio = document.createElement('div');
    foglio.className = 'foglio';
    const w = 340 + Math.random() * 80;
    const rot = (Math.random() - 0.5) * 5;

    const rect = tavoloContainer.getBoundingClientRect();
    const x = Math.abs(pos.x) + (rect.width / 2) - (w / 2) + (Math.random() - 0.5) * 50;
    const y = Math.abs(pos.y) + (rect.height / 2) - 150 + (Math.random() - 0.5) * 50;

    foglio.style.cssText = `width:${w}px; left:${x}px; top:${y}px; transform:rotate(${rot}deg); opacity:0;`;
    const img = document.createElement('img'); img.src = src;
    foglio.appendChild(img);
    superficie.appendChild(foglio);

    setTimeout(() => foglio.style.opacity = '1', 50);
    foglio.onclick = (e) => {
        e.stopPropagation();
        foglio.style.opacity = '0';
        setTimeout(() => foglio.remove(), 500);
    };
}

// DRAG TAVOLO
let drag = false, last = {x:0, y:0};
tavoloContainer.onmousedown = e => {
    if (e.target.id === 'btn-luce') return;
    drag = true; last = { x: e.clientX, y: e.clientY };
};
window.onmousemove = e => {
    if (!drag) return;
    pos.x += e.clientX - last.x; pos.y += e.clientY - last.y;
    last = { x: e.clientX, y: e.clientY };
    superficie.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0)`;
};
window.onmouseup = () => drag = false;

// INIZIALIZZAZIONE RULLINI
const addThumb = (f, dest) => {
    const img = document.createElement('img');
    img.src = `disegni/${f}`;
    img.onclick = (e) => { e.stopPropagation(); mettiSulTavolo(img.src); };
    img.onerror = () => img.remove();
    dest.appendChild(img);
};
finiti.reverse().forEach(f => addThumb(f, rv));
infieri.forEach(f => addThumb(f, rh));
</script>
</body>
</html>
