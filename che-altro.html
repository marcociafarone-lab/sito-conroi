<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Che Altro - Mosaico Dinamico</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: grab;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body:active { cursor: grabbing; }

        #world {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            will-change: transform;
        }

        #viewport {
            position: absolute;
            width: 30000px;
            height: 30000px;
            top: -15000px;
            left: -15000px;
        }

        .patch-container {
            position: absolute;
            overflow: hidden;
            background-color: #050505;
            border: 0.5px solid rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: left 0.8s cubic-bezier(0.7, 0, 0.3, 1), 
                        top 0.8s cubic-bezier(0.7, 0, 0.3, 1),
                        width 0.8s cubic-bezier(0.7, 0, 0.3, 1),
                        height 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .patch-item {
            width: auto; 
            height: auto;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            filter: invert(0) grayscale(0);
            transition: filter 0.5s ease, opacity 0.8s ease;
            display: block;
            pointer-events: none;
            opacity: 0;
            image-rendering: -webkit-optimize-contrast; 
        }

        .patch-item.loaded { opacity: 1; }

        /* Testo di fallback visibile solo se l'immagine non carica */
        .error-label {
            font-size: 8px;
            color: #1a1a1a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .patch-container:hover .patch-item {
            filter: invert(1) grayscale(1);
        }

        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center; align-items: center;
            z-index: 10000;
            cursor: zoom-out;
        }

        #modal img { 
            max-width: 90%; 
            max-height: 90%; 
            object-fit: contain; 
        }

        #ui-layer {
            position: fixed;
            top: 35px; left: 35px;
            pointer-events: none; z-index: 1000;
        }

        .label { font-size: 9px; letter-spacing: 5px; color: #333; text-transform: uppercase; }
        .title { color: #555; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }
        
        #shuffle-btn {
            position: fixed;
            top: 35px; right: 35px;
            background: transparent;
            border: 1px solid #222;
            color: #444;
            padding: 8px 15px;
            font-family: inherit;
            font-size: 9px;
            letter-spacing: 3px;
            cursor: pointer;
            z-index: 1001;
            pointer-events: auto;
            transition: all 0.3s ease;
        }

        #shuffle-btn:hover {
            border-color: #666;
            color: #eee;
            background: #111;
        }

        #instruction { position: fixed; bottom: 35px; right: 35px; font-size: 8px; color: #222; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="label">Frammenti / Piano Solo</div>
        <div class="title">Che Altro</div>
    </div>

    <button id="shuffle-btn" onclick="reshuffle()">RESHUFFLE</button>

    <div id="instruction">FLUTTUA SUL TESSUTO / CLICCA IL FRAMMENTO</div>

    <div id="world">
        <div id="viewport"></div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="full-image" src="">
    </div>

    <script>
        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const modal = document.getElementById('modal');
        const fullImg = document.getElementById('full-image');

        // --- CONFIGURAZIONE ---
        const realFileCount = 14; 
        const totalPatches = 120; 

        let offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let velocity = { x: 0, y: 0 };
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        let dragStartTime = 0;
        const friction = 0.95;

        function init() {
            viewport.innerHTML = '';
            for (let i = 0; i < totalPatches; i++) {
                const fileIndex = (i % realFileCount) + 1;
                // Prova ad aggiungere './' davanti per aiutare GitHub Pages a trovare la cartella
                const imgSrc = `./disegni/${fileIndex}.jpg`;
                createPatch(imgSrc, i);
            }
            requestAnimationFrame(physicsLoop);
        }

        function createPatch(imgSrc, index) {
            const container = document.createElement('div');
            container.className = 'patch-container';
            container.setAttribute('data-index', index);
            
            const errorLabel = document.createElement('div');
            errorLabel.className = 'error-label';
            errorLabel.innerText = `[${(index % realFileCount) + 1}]`;
            container.appendChild(errorLabel);
            
            const img = document.createElement('img');
            img.className = 'patch-item';
            img.src = imgSrc;

            img.onload = () => {
                img.classList.add('loaded');
                errorLabel.style.display = 'none';
                reshuffle(); 
            };

            img.onerror = () => {
                // Se l'immagine fallisce, lasciamo il contenitore con il numero
                reshuffle();
            };

            container.onclick = (e) => {
                if (Math.abs(velocity.x) > 2 || Math.abs(velocity.y) > 2) return;
                if (Date.now() - dragStartTime > 200) return;
                fullImg.src = imgSrc;
                modal.style.display = 'flex';
            };

            container.appendChild(img);
            viewport.appendChild(container);
        }

        function calculateHeight(index) {
            return 250 + ((index * 137) % 250);
        }

        function reshuffle() {
            const containers = document.querySelectorAll('.patch-container');
            if (containers.length === 0) return;

            const colW = 350;
            const cols = 6; 
            const colHeights = new Array(cols).fill(0);
            const gutter = 3;

            containers.forEach((container) => {
                const idx = parseInt(container.getAttribute('data-index'));
                const shortest = colHeights.indexOf(Math.min(...colHeights));
                
                const h = calculateHeight(idx);
                const x = 7500 + (shortest * colW) - ((cols * colW) / 2);
                const y = 7500 + colHeights[shortest];

                container.style.width = colW + "px";
                container.style.height = h + "px";
                container.style.left = x + "px";
                container.style.top = y + "px";

                const img = container.querySelector('.patch-item');
                if (img && img.complete && img.naturalWidth) {
                    const extraY = img.naturalHeight - h;
                    const shiftY = extraY > 0 ? (((idx * 0.131) % 1) * extraY) : 0;
                    img.style.transform = `translate3d(0px, ${-shiftY}px, 0)`;
                }

                colHeights[shortest] += (h + gutter);
            });
        }

        function physicsLoop() {
            if (!isDragging) {
                offset.x += velocity.x;
                offset.y += velocity.y;
                velocity.x *= friction;
                velocity.y *= friction;
                updateTransform();
            }
            requestAnimationFrame(physicsLoop);
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            isDragging = true;
            dragStartTime = Date.now();
            lastMouse.x = e.clientX; lastMouse.y = e.clientY;
            velocity = { x: 0, y: 0 };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            offset.x += dx; offset.y += dy;
            velocity.x = dx; velocity.y = dy;
            lastMouse.x = e.clientX; lastMouse.y = e.clientY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => isDragging = false);

        function updateTransform() {
            world.style.transform = `translate3d(${offset.x}px, ${offset.y}px, 0)`;
        }

        window.onresize = () => {
            offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
            updateTransform();
        };

        init();
    </script>
</body>
</html>
