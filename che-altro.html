<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Che Altro - Mosaico Dinamico</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: grab;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body:active { cursor: grabbing; }

        #world {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            will-change: transform;
            transition: transform 0.1s linear;
        }

        #viewport {
            position: absolute;
            width: 20000px;
            height: 20000px;
            /* Centriamo il contenuto rispetto allo zero del mondo */
            top: -10000px;
            left: -10000px;
        }

        .patch-container {
            position: absolute;
            overflow: hidden;
            background-color: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Rimosse transizioni pesanti che potevano causare glitch su GitHub */
        }

        .patch-item {
            width: auto; 
            height: auto;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            filter: grayscale(1);
            transition: filter 0.5s ease, opacity 0.8s ease;
            display: block;
            pointer-events: none;
            opacity: 0;
        }

        .patch-item.loaded { opacity: 1; }

        .error-label {
            font-size: 8px;
            color: #222;
            letter-spacing: 1px;
        }

        .patch-container:hover {
            border-color: rgba(255,255,255,0.2);
            background-color: #111;
        }

        .patch-container:hover .patch-item {
            filter: grayscale(0) invert(0);
        }

        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center; align-items: center;
            z-index: 10000;
            cursor: zoom-out;
        }

        #modal img { 
            max-width: 90%; 
            max-height: 90%; 
            object-fit: contain; 
        }

        #ui-layer {
            position: fixed;
            top: 35px; left: 35px;
            pointer-events: none; z-index: 1000;
        }

        .label { font-size: 9px; letter-spacing: 5px; color: #444; text-transform: uppercase; }
        .title { color: #888; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }
        
        #shuffle-btn {
            position: fixed;
            top: 35px; right: 35px;
            background: transparent;
            border: 1px solid #333;
            color: #666;
            padding: 8px 15px;
            font-family: inherit;
            font-size: 9px;
            letter-spacing: 3px;
            cursor: pointer;
            z-index: 1001;
            pointer-events: auto;
        }

        #instruction { position: fixed; bottom: 35px; right: 35px; font-size: 8px; color: #333; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="label">Frammenti / Piano Solo</div>
        <div class="title">Che Altro</div>
    </div>

    <button id="shuffle-btn" onclick="init()">RESHUFFLE</button>

    <div id="instruction">TRASCINA PER ESPLORARE / CLICCA PER DETTAGLIO</div>

    <div id="world">
        <div id="viewport"></div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="full-image" src="">
    </div>

    <script>
        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const modal = document.getElementById('modal');
        const fullImg = document.getElementById('full-image');

        // --- CONFIGURAZIONE ---
        const realFileCount = 14; 
        const totalPatches = 100; 

        let offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let velocity = { x: 0, y: 0 };
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        const friction = 0.95;

        function init() {
            viewport.innerHTML = '';
            // Reset posizione se andiamo in tilt
            offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
            updateTransform();

            const colW = 320;
            const cols = 5; 
            const colHeights = new Array(cols).fill(0);
            const gutter = 10;

            for (let i = 0; i < totalPatches; i++) {
                const fileIndex = (i % realFileCount) + 1;
                const imgSrc = `disegni/${fileIndex}.jpg`;
                
                const container = document.createElement('div');
                container.className = 'patch-container';
                
                // Calcolo posizione immediato (Masonry)
                const shortestCol = colHeights.indexOf(Math.min(...colHeights));
                const h = 200 + ((i * 149) % 300);
                const x = 10000 + (shortestCol * (colW + gutter)) - ((cols * colW) / 2);
                const y = 10000 + colHeights[shortestCol];

                container.style.width = colW + "px";
                container.style.height = h + "px";
                container.style.left = x + "px";
                container.style.top = y + "px";

                const label = document.createElement('div');
                label.className = 'error-label';
                label.innerText = fileIndex;
                container.appendChild(label);

                const img = document.createElement('img');
                img.className = 'patch-item';
                img.src = imgSrc;

                img.onload = () => {
                    img.classList.add('loaded');
                    label.style.display = 'none';
                    // Shift casuale interno per texture
                    const extraY = img.naturalHeight - h;
                    if(extraY > 0) {
                        const shiftY = ((i * 0.13) % 1) * extraY;
                        img.style.transform = `translateY(${-shiftY}px)`;
                    }
                };

                container.onclick = () => {
                    if (Math.abs(velocity.x) > 2 || Math.abs(velocity.y) > 2) return;
                    fullImg.src = imgSrc;
                    modal.style.display = 'flex';
                };

                container.appendChild(img);
                viewport.appendChild(container);
                colHeights[shortestCol] += (h + gutter);
            }
        }

        function physicsLoop() {
            if (!isDragging) {
                offset.x += velocity.x;
                offset.y += velocity.y;
                velocity.x *= friction;
                velocity.y *= friction;
                updateTransform();
            }
            requestAnimationFrame(physicsLoop);
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            isDragging = true;
            lastMouse.x = e.clientX; lastMouse.y = e.clientY;
            velocity = { x: 0, y: 0 };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            offset.x += dx; offset.y += dy;
            velocity.x = dx; velocity.y = dy;
            lastMouse.x = e.clientX; lastMouse.y = e.clientY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => isDragging = false);

        function updateTransform() {
            world.style.transform = `translate3d(${offset.x}px, ${offset.y}px, 0)`;
        }

        window.onload = () => {
            init();
            physicsLoop();
        };
    </script>
</body>
</html>
