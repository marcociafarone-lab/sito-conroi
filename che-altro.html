<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Che Altro - Mosaico Dinamico</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: grab;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body:active { cursor: grabbing; }

        #world {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            will-change: transform;
        }

        #viewport {
            position: absolute;
            /* Area di lavoro vasta per permettere l'esplorazione */
            width: 20000px;
            height: 20000px;
            top: -10000px;
            left: -10000px;
        }

        .patch-container {
            position: absolute;
            overflow: hidden;
            background-color: #050505;
            border: 0.5px solid rgba(255,255,255,0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .patch-item {
            width: 100%; 
            height: auto;
            position: absolute;
            top: 0;
            left: 0;
            filter: grayscale(1);
            transition: filter 0.5s ease, opacity 0.8s ease;
            opacity: 0;
            pointer-events: none;
        }

        .patch-item.loaded { opacity: 1; }

        .patch-container:hover {
            z-index: 10;
            border-color: rgba(255,255,255,0.3);
        }

        .patch-container:hover .patch-item {
            filter: grayscale(0);
        }

        .error-label {
            font-size: 8px;
            color: #222;
            letter-spacing: 1px;
            position: absolute;
        }

        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center; align-items: center;
            z-index: 10000;
            cursor: zoom-out;
        }

        #modal img { 
            max-width: 90%; 
            max-height: 90%; 
            object-fit: contain; 
        }

        #ui-layer {
            position: fixed;
            top: 35px; left: 35px;
            pointer-events: none; z-index: 1000;
        }

        .label { font-size: 9px; letter-spacing: 5px; color: #333; text-transform: uppercase; }
        .title { color: #555; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }
        
        #shuffle-btn {
            position: fixed;
            top: 35px; right: 35px;
            background: transparent;
            border: 1px solid #222;
            color: #444;
            padding: 8px 15px;
            font-family: inherit;
            font-size: 9px;
            letter-spacing: 3px;
            cursor: pointer;
            z-index: 1001;
            pointer-events: auto;
        }

        #instruction { position: fixed; bottom: 35px; right: 35px; font-size: 8px; color: #222; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="label">Frammenti / Piano Solo</div>
        <div class="title">Che Altro</div>
    </div>

    <button id="shuffle-btn" onclick="renderMosaico()">RESHUFFLE</button>

    <div id="instruction">TRASCINA PER ESPLORARE / CLICCA PER IL DETTAGLIO</div>

    <div id="world">
        <div id="viewport"></div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="full-image" src="">
    </div>

    <script>
        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const modal = document.getElementById('modal');
        const fullImg = document.getElementById('full-image');

        const realFileCount = 14; 
        const totalPatches = 120; 

        let offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let velocity = { x: 0, y: 0 };
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        const friction = 0.95;

        function renderMosaico() {
            viewport.innerHTML = '';
            
            const colW = 300; // Larghezza colonne
            const cols = 6;   // Numero di colonne
            const gutter = 2; // Spazio minimo tra mattonelle
            const colHeights = new Array(cols).fill(0);

            // Centriamo il punto di origine
            const startX = 10000 - ((cols * colW) / 2);
            const startY = 10000;

            for (let i = 0; i < totalPatches; i++) {
                const fileIndex = (i % realFileCount) + 1;
                const imgSrc = `disegni/${fileIndex}.jpg`;

                const container = document.createElement('div');
                container.className = 'patch-container';

                // Logica Masonry (trova la colonna più corta)
                const shortest = colHeights.indexOf(Math.min(...colHeights));
                
                // Altezza variabile basata sull'indice per creare ritmo
                const h = 180 + ((i * 137) % 250); 
                
                const x = startX + (shortest * (colW + gutter));
                const y = startY + colHeights[shortest];

                container.style.width = colW + "px";
                container.style.height = h + "px";
                container.style.left = x + "px";
                container.style.top = y + "px";

                const label = document.createElement('div');
                label.className = 'error-label';
                label.innerText = fileIndex;
                container.appendChild(label);

                const img = document.createElement('img');
                img.className = 'patch-item';
                img.src = imgSrc;

                img.onload = () => {
                    img.classList.add('loaded');
                    label.style.display = 'none';
                    
                    // Effetto "Crop" casuale
                    const diff = img.naturalHeight - h;
                    if (diff > 0) {
                        const shift = ((i * 0.17) % 1) * diff;
                        img.style.top = `-${shift}px`;
                    }
                };

                container.onclick = () => {
                    if (Math.abs(velocity.x) > 2 || Math.abs(velocity.y) > 2) return;
                    fullImg.src = imgSrc;
                    modal.style.display = 'flex';
                };

                container.appendChild(img);
                viewport.appendChild(container);

                // Aggiorna altezza colonna per il prossimo tassello
                colHeights[shortest] += (h + gutter);
            }
        }

        // --- FISICA E MOVIMENTO ---
        function physicsLoop() {
            if (!isDragging) {
                offset.x += velocity.x;
                offset.y += velocity.y;
                velocity.x *= friction;
                velocity.y *= friction;
                updateTransform();
            }
            requestAnimationFrame(physicsLoop);
        }

        function updateTransform() {
            world.style.transform = `translate3d(${offset.x}px, ${offset.y}px, 0)`;
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            isDragging = true;
            lastMouse.x = e.clientX; lastMouse.y = e.clientY;
            velocity = { x: 0, y: 0 };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            offset.x += dx; offset.y += dy;
            velocity.x = dx; velocity.y = dy;
            lastMouse.x = e.clientX; lastMouse.y = e.clientY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.onload = () => {
            renderMosaico();
            physicsLoop();
        };

        window.onresize = () => {
            offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
            updateTransform();
        };
    </script>
</body>
</html>
