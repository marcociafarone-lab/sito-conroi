<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Che Altro - Mosaico Denso</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: grab;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body:active { cursor: grabbing; }

        #world {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            will-change: transform;
        }

        #viewport {
            position: absolute;
            width: 12000px;
            height: 12000px;
            top: -6000px;
            left: -6000px;
            display: block;
        }

        .patch-container {
            position: absolute;
            overflow: hidden;
            background-color: #050505;
            border: none; 
            cursor: pointer;
            /* Rimosse sovrapposizioni: le immagini sono accostate */
            margin: 0; 
            transition: opacity 0.5s ease;
        }

        .patch-item {
            width: 140%; /* Leggermente più grande per permettere il crop */
            height: 140%;
            /* Object-fit none + posizione casuale creano l'effetto dettaglio */
            object-fit: cover;
            position: absolute;
            filter: grayscale(1) brightness(0.4) contrast(1.2);
            transition: filter 0.8s ease, opacity 1s ease;
            opacity: 0;
            pointer-events: none;
        }

        .patch-item.loaded { 
            opacity: 1; 
        }

        .patch-container:hover {
            z-index: 5;
        }

        .patch-container:hover .patch-item {
            filter: grayscale(0) brightness(1) contrast(1.1);
        }

        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            display: none;
            justify-content: center; align-items: center;
            z-index: 10000;
            cursor: zoom-out;
        }

        #modal img { 
            max-width: 95%; 
            max-height: 95%; 
            object-fit: contain; 
        }

        #ui-layer {
            position: fixed;
            top: 35px; left: 35px;
            pointer-events: none; z-index: 1000;
        }

        .label { font-size: 9px; letter-spacing: 5px; color: #333; text-transform: uppercase; }
        .title { color: #555; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }
        
        #shuffle-btn {
            position: fixed;
            top: 35px; right: 35px;
            background: transparent;
            border: 1px solid #1a1a1a;
            color: #333;
            padding: 8px 15px;
            font-family: inherit;
            font-size: 9px;
            letter-spacing: 3px;
            cursor: pointer;
            z-index: 1001;
            pointer-events: auto;
            transition: all 0.3s;
        }

        #shuffle-btn:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.05); }
        #instruction { position: fixed; bottom: 35px; right: 35px; font-size: 8px; color: #222; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="label">Frammenti / Piano Solo</div>
        <div class="title">Che Altro</div>
    </div>

    <button id="shuffle-btn" onclick="renderMosaico()">RESHUFFLE</button>

    <div id="instruction">DETTAGLI MATERICI / CLICCA PER L'OPERA INTERA</div>

    <div id="world">
        <div id="viewport"></div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="full-image" src="">
    </div>

    <script>
        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const modal = document.getElementById('modal');
        const fullImg = document.getElementById('full-image');

        // --- GESTIONE ARCHIVIO ---
        let fileCount = 20; 

        let offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let velocity = { x: 0, y: 0 };
        let isDragging = false;
        
        let mouseDownTime = 0;
        let startPos = { x: 0, y: 0 };
        let lastMouse = { x: 0, y: 0 };
        
        const friction = 0.95;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function renderMosaico() {
            viewport.innerHTML = '';
            velocity = { x: 0, y: 0 };

            // Larghezze di colonna variabili per rompere la monotonia
            const possibleWidths = [240, 320, 400];
            const cols = fileCount > 24 ? 7 : (fileCount > 12 ? 4 : 3);   
            const colHeights = new Array(cols).fill(0).map(() => Math.random() * 200);
            const colWidths = new Array(cols).fill(0).map(() => possibleWidths[Math.floor(Math.random() * possibleWidths.length)]);

            // Calcolo larghezza totale del blocco
            const totalW = colWidths.reduce((a, b) => a + b, 0);
            const startX = 6000 - (totalW / 2);
            const startY = 6000 - 500;

            let items = [];
            for (let i = 1; i <= fileCount; i++) {
                items.push(i);
            }
            shuffleArray(items);

            items.forEach((fileIndex) => {
                const imgSrc = `disegni/${fileIndex}.jpg`;
                const container = document.createElement('div');
                container.className = 'patch-container';

                // Scelta colonna: cerchiamo di bilanciare ma con un tocco di random
                let colIdx = colHeights.indexOf(Math.min(...colHeights));
                
                const h = 250 + Math.floor(Math.random() * 350); 
                
                // Calcolo X in base alle larghezze variabili
                let currentX = startX;
                for(let j=0; j<colIdx; j++) currentX += colWidths[j];
                
                const y = startY + colHeights[colIdx];

                container.style.width = colWidths[colIdx] + "px";
                container.style.height = h + "px";
                container.style.left = currentX + "px";
                container.style.top = y + "px";

                const img = document.createElement('img');
                img.className = 'patch-item';
                img.src = imgSrc;
                
                // CROP CASUALE: sposta l'immagine per mostrare un dettaglio diverso ogni volta
                img.style.top = `-${Math.random() * 40}%`;
                img.style.left = `-${Math.random() * 40}%`;

                img.onload = () => img.classList.add('loaded');
                img.onerror = () => container.style.display = 'none';

                container.addEventListener('mouseup', (e) => {
                    const duration = Date.now() - mouseDownTime;
                    const dist = Math.hypot(e.clientX - startPos.x, e.clientY - startPos.y);
                    if (duration < 250 && dist < 10) {
                        fullImg.src = imgSrc;
                        modal.style.display = 'flex';
                    }
                });

                container.appendChild(img);
                viewport.appendChild(container);

                colHeights[colIdx] += h;
            });
        }

        function physicsLoop() {
            if (!isDragging) {
                offset.x += velocity.x;
                offset.y += velocity.y;
                velocity.x *= friction;
                velocity.y *= friction;
                updateTransform();
            }
            requestAnimationFrame(physicsLoop);
        }

        function updateTransform() {
            world.style.transform = `translate3d(${offset.x}px, ${offset.y}px, 0)`;
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            isDragging = true;
            mouseDownTime = Date.now();
            startPos = { x: e.clientX, y: e.clientY };
            lastMouse = { x: e.clientX, y: e.clientY };
            velocity = { x: 0, y: 0 };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            offset.x += dx; 
            offset.y += dy;
            velocity.x = dx; 
            velocity.y = dy;
            lastMouse.x = e.clientX; 
            lastMouse.y = e.clientY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        window.onload = () => {
            renderMosaico();
            physicsLoop();
        };

        window.onresize = () => {
            offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
            updateTransform();
        };
    </script>
</body>
</html>
