<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI — studio</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100%; height: 100%;
    background: #000;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
  }

  /* RULLINI */
  #rullino-h, #rullino-v {
    position: fixed; z-index: 100;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(10px);
  }
  #rullino-h { top: 0; left: 140px; right: 0; height: 140px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; padding: 0 16px; gap: 12px; overflow-x: auto; }
  #rullino-v { left: 0; top: 0; bottom: 0; width: 140px; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto; padding: 16px 10px; }
  
  #rullino-h img, #rullino-v img {
    height: 100px; width: auto; flex-shrink: 0; cursor: pointer;
    filter: grayscale(1) opacity(0.5); transition: 0.3s;
  }
  #rullino-v img { width: 100%; height: auto; margin-bottom: 10px; }
  #rullino-h img:hover, #rullino-v img:hover { filter: none; opacity: 1; }

  /* IL TAVOLO */
  #tavolo {
    position: fixed; inset: 0;
    overflow: hidden; cursor: grab; z-index: 5;
    background-color: #1a1a1a;
    background-image: url('tavolo.jpg'); /* Assicurati che il file sia in cartella */
    background-size: 1800px;
  }
  #tavolo:active { cursor: grabbing; }

  #overlay-luce {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 10;
    transition: background 1.5s ease;
  }

  .luce-calda {
    background: radial-gradient(circle at 30% 30%, rgba(255, 180, 50, 0.15) 0%, rgba(0,0,0,0.5) 80%);
  }
  .luce-fredda {
    background: radial-gradient(circle at 70% 20%, rgba(100, 150, 255, 0.15) 0%, rgba(0,0,0,0.7) 90%);
  }

  #superficie {
    position: absolute;
    width: 4000px; height: 4000px;
    z-index: 6; /* Sopra il tavolo, sotto la luce */
  }

  .foglio {
    position: absolute;
    background: #fff;
    padding: 5px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    transition: opacity 0.5s ease;
    cursor: pointer;
  }
  .foglio img { display: block; width: 100%; height: auto; pointer-events: none; }

  #btn-luce {
    position: fixed; bottom: 28px; right: 32px; z-index: 200;
    background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.5);
    font-family: 'Courier New', monospace; font-size: 8px;
    letter-spacing: 0.3em; padding: 8px 14px; cursor: pointer;
  }

  nav { position: fixed; bottom: 28px; left: 152px; z-index: 200; font-size: 9px; letter-spacing: 0.2em; }
  nav a { display: block; color: rgba(255,255,255,0.3); text-decoration: none; margin-bottom: 4px; }
</style>
</head>
<body>

<div id="rullino-v"></div>
<div id="rullino-h"></div>

<div id="tavolo">
  <div id="superficie"></div>
  <div id="overlay-luce" class="luce-calda"></div>
</div>

<button id="btn-luce" onclick="cambiaLuce()">che altro?</button>

<nav>
  <a href="/">&#x25A1;</a>
  <a href="/blues-rosa">blues rosa</a>
  <a href="/bitless-mirage">bitless / mirage</a>
  <a href="/matrice">matrice</a>
</nav>

<script>
const TOTALE = 20;
const IN_FIERI = ['19a']; 
const finiti = Array.from({length: TOTALE}, (_, i) => `${i+1}.jpg`);
const infieri = IN_FIERI.map(f => `${f}.jpg`);

const superficie = document.getElementById('superficie');
const overlayLuce = document.getElementById('overlay-luce');

// Posizione iniziale della superficie (centrata)
let pos = { x: -1000, y: -1000 };
superficie.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0)`;

let tipoLuce = 0;
function cambiaLuce() {
    tipoLuce = (tipoLuce + 1) % 2;
    overlayLuce.className = (tipoLuce === 0) ? 'luce-calda' : 'luce-fredda';
}

function mettiSulTavolo(src) {
    const foglio = document.createElement('div');
    foglio.className = 'foglio';
    
    // Dimensioni e rotazione casuale
    const w = 300 + Math.random() * 150;
    const rot = (Math.random() - 0.5) * 10;

    // Calcolo posizione per farlo apparire al centro dello schermo attuale
    // Sottraiamo pos.x e pos.y perché la superficie si muove in direzione opposta
    const x = Math.abs(pos.x) + (window.innerWidth / 2) - (w / 2) + (Math.random() - 0.5) * 100;
    const y = Math.abs(pos.y) + (window.innerHeight / 2) - 200 + (Math.random() - 0.5) * 100;

    foglio.style.cssText = `
        width: ${w}px; 
        left: ${x}px; 
        top: ${y}px; 
        transform: rotate(${rot}deg);
        opacity: 0;
    `;
    
    const img = document.createElement('img');
    img.src = src;
    foglio.appendChild(img);
    superficie.appendChild(foglio);

    // Animazione ingresso
    setTimeout(() => { foglio.style.opacity = '1'; }, 50);

    // Rimuovi foglio al click
    foglio.onclick = (e) => {
        e.stopPropagation();
        foglio.style.opacity = '0';
        setTimeout(() => foglio.remove(), 500);
    };
}

// DRAG DEL TAVOLO
let drag = false, last = {x:0, y:0};

window.onmousedown = e => {
    // Non trascinare se clicchi sui rullini o sul tasto
    if (e.target.closest('#rullino-v') || e.target.closest('#rullino-h') || e.target.id === 'btn-luce') return;
    drag = true; 
    last = { x: e.clientX, y: e.clientY };
};

window.onmousemove = e => {
    if (!drag) return;
    const deltaX = e.clientX - last.x;
    const deltaY = e.clientY - last.y;
    pos.x += deltaX;
    pos.y += deltaY;
    last = { x: e.clientX, y: e.clientY };
    superficie.style.transform = `translate3d(${pos.x}px, ${pos.y}px, 0)`;
};

window.onmouseup = () => { drag = false; };

// INIZIALIZZAZIONE RULLINI
const addThumb = (f, dest) => {
    const img = document.createElement('img');
    img.src = `disegni/${f}`;
    img.onclick = (e) => {
        e.stopPropagation();
        mettiSulTavolo(img.src);
    };
    img.onerror = () => img.remove();
    dest.appendChild(img);
};

finiti.reverse().forEach(f => addThumb(f, document.getElementById('rullino-v')));
infieri.forEach(f => addThumb(f, document.getElementById('rullino-h')));
</script>

</body>
</html>
