<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI — surfaces</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
  }

  #superficie {
    position: fixed;
    inset: 0;
    background-image: url('surface.jpg');
    background-size: cover;
    background-position: left center;
  }

  /* Schema — sul grigio, sinistra */
  #schema {
    position: fixed;
    left: 4%;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    width: 38%;
    max-width: 520px;
    pointer-events: none;
  }

  /* Simbolo — sul grigio, decentrato in basso */
  #simbolo {
    position: fixed;
    left: 44%;
    bottom: 12%;
    z-index: 5;
    pointer-events: none;
    mix-blend-mode: overlay;
    opacity: 0.12;
  }

  /* Link — striscia bianca a destra */
  #links {
    position: fixed;
    right: 3.5%;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    font-size: 9px;
    letter-spacing: 0.2em;
    line-height: 2.8;
    text-align: left;
  }

  #links a {
    display: block;
    color: rgba(0,0,0,0.55);
    text-decoration: none;
    transition: color 0.3s;
  }

  #links a:hover { color: rgba(0,0,0,0.95); }

  #links .esterni {
    margin-top: 2.5em;
    color: rgba(0,0,0,0.35);
    line-height: 2.4;
  }

  #links .esterni a {
    color: rgba(0,0,0,0.35);
  }

  #links .esterni a:hover { color: rgba(0,0,0,0.75); }

  @media (max-width: 700px) and (orientation: portrait) {
    #superficie {
      background-position: top center;
      background-size: auto 100%;
    }
    #schema {
      left: 4%;
      top: 8%;
      transform: none;
      width: 55%;
    }
    #simbolo {
      left: 55%;
      bottom: 30%;
    }
    #links {
      right: auto;
      top: auto;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      line-height: 2;
    }
  }
</style>
</head>
<body>

<div id="superficie"></div>

<!-- Schema SVG sul grigio -->

    <rect x="182" y="202" width="22" height="17" fill="url(#lp)" stroke="#1a9fc0" stroke-width="0.4"/>

    <text x="210" y="182" font-size="8.5">EP</text>
    <text x="210" y="214" font-size="8.5">LP</text>
    <text x="210" y="246" font-size="8.5">CD</text>
    <text x="210" y="278" font-size="8.5">disegni</text>

    <text x="265" y="182" text-anchor="end">10"</text>
    <text x="265" y="214" text-anchor="end">Blues Rosa</text>
    <text x="265" y="246" text-anchor="end">CONROI</text>
    <text x="265" y="278" text-anchor="end">che altro</text>

    <path d="M270 170 L276 170 L276 278 L270 278" stroke="#1a9fc0" stroke-width="0.6" fill="none"/>

</svg>
</div>

<!-- Simbolo — decentrato in basso sul grigio -->

<script>
const data = `
000000000000000000000000000000000000000000
000000000000000000000000000000000000000000
001111111111111111111111111111111111111100
001111111111111111111111111111111111111100
001100000000000000000000000000000000000000
001100000000000000000000000000000000000000
001100111111111111111111111111111111111100
001100111111111111111111111111111111111100
001100110000000000000000000000000000001100
001100110000000000000000000000000000001100
001100110011111111111111111111111111001100
001100110011111111111111111111111111001100
001100110011000000000000000000000011001100
001100110011000000000000000000000011001100
001100110011001111111111111111110011001100
001100110011001111111111111111110011001100
001100110011001100000000000000000011001100
001100110011001100000000000000000011001100
001100110011001100111111111111110011001100
001100110011001100111111111111110011001100
001100110011001100110000000000110011001100
001100110011001100110000000000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000000000110011001100
001100110011001100110000000000110011001100
001100110011001100111111111111110011001100
001100110011001100111111111111110011001100
001100110000000000000000000000000000001100
001100110000000000000000000000000000001100
001100111111111111111111111111111111111100
001100111111111111111111111111111111111100
001100000000000000000000000000000000000000
001100000000000000000000000000000000000000
001111111111111111111111111111111111111100
001111111111111111111111111111111111111100
000000000000000000000000000000000000000000
000000000000000000000000000000000000000000`.trim().split('\n');

const rows = data.length;
const cols = data[0].length;
const canvas = document.getElementById('simbolo');
const ctx = canvas.getContext('2d');
const SCALE = Math.floor(Math.min(160 / cols, 160 / rows));
canvas.width = cols * SCALE;
canvas.height = rows * SCALE;

ctx.fillStyle = '#ffffff';
for (let r = 0; r < rows; r++) {
  for (let c = 0; c < cols; c++) {
    if (data[r][c] === '1') {
      ctx.fillRect(c * SCALE, r * SCALE, SCALE, SCALE);
    }
  }
}
</script>
</body>
</html>
