<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI — surfaces</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
  }

  /* Superficie — immagine a tutto schermo */
  #superficie {
    position: fixed;
    inset: 0;
    background-image: url('surface.jpg');
    background-size: cover;
    background-position: left center;
  }

  /* Link ancorati alla striscia bianca — destra */
  #links {
    position: fixed;
    right: 3.5%;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    font-size: 9px;
    letter-spacing: 0.2em;
    line-height: 2.8;
    text-align: left;
  }

  #links a {
    display: block;
    color: rgba(0,0,0,0.45);
    text-decoration: none;
    transition: color 0.3s;
  }

  #links a:hover { color: rgba(0,0,0,0.9); }

  #links a.inattivo {
    color: rgba(0,0,0,0.18);
    pointer-events: none;
  }

  /* Titolo pagina — quasi invisibile sul grigio */
  #titolo {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 9px;
    letter-spacing: 0.35em;
    color: rgba(100,98,95,0.35);
    pointer-events: none;
    white-space: nowrap;
  }

  /* MOBILE PORTRAIT — striscia bianca in basso */
  @media (max-width: 700px) and (orientation: portrait) {
    #superficie {
      background-position: top center;
      background-size: auto 100%;
    }

    #links {
      right: auto;
      top: auto;
      bottom: 6%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      line-height: 2.2;
    }
  }
</style>
</head>
<body>

<div id="superficie"></div>

<!-- Simbolo embossed sul grigio -->
<canvas id="emboss" style="
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  mix-blend-mode:overlay;
  opacity:0.10;
  z-index:2;
"></canvas>

<div id="titolo">surfaces</div>

<div id="links">
  <a href="/bitless">bitless</a>
  <a href="/bitless-mirage">bitless / mirage</a>
  <a href="/blues-rosa">blues rosa</a>
  <a href="#" class="inattivo">conroi</a>
  <a href="/matrice">matrice</a>
  <a href="/che-altro">che altro</a>
</div>

</body>
<script>
const data = `
000000000000000000000000000000000000000000
000000000000000000000000000000000000000000
001111111111111111111111111111111111111100
001111111111111111111111111111111111111100
001100000000000000000000000000000000000000
001100000000000000000000000000000000000000
001100111111111111111111111111111111111100
001100111111111111111111111111111111111100
001100110000000000000000000000000000001100
001100110000000000000000000000000000001100
001100110011111111111111111111111111001100
001100110011111111111111111111111111001100
001100110011000000000000000000000011001100
001100110011000000000000000000000011001100
001100110011001111111111111111110011001100
001100110011001111111111111111110011001100
001100110011001100000000000000000011001100
001100110011001100000000000000000011001100
001100110011001100111111111111110011001100
001100110011001100111111111111110011001100
001100110011001100110000000000110011001100
001100110011001100110000000000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000000000110011001100
001100110011001100110000000000110011001100
001100110011001100111111111111110011001100
001100110011001100111111111111110011001100
001100110000000000000000000000000000001100
001100110000000000000000000000000000001100
001100111111111111111111111111111111111100
001100111111111111111111111111111111111100
001100000000000000000000000000000000000000
001100000000000000000000000000000000000000
001111111111111111111111111111111111111100
001111111111111111111111111111111111111100
000000000000000000000000000000000000000000
000000000000000000000000000000000000000000`.trim().split('\n');

const rows = data.length;
const cols = data[0].length;
const canvas = document.getElementById('emboss');
const ctx = canvas.getContext('2d');

function draw() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const SCALE = Math.floor(Math.min(
    window.innerWidth * 0.55 / cols,
    window.innerHeight * 0.55 / rows
  ));

  const ox = Math.floor((window.innerWidth - cols * SCALE) / 2);
  const oy = Math.floor((window.innerHeight - rows * SCALE) / 2);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ffffff';

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (data[r][c] === '1') {
        ctx.fillRect(ox + c * SCALE, oy + r * SCALE, SCALE, SCALE);
      }
    }
  }
}

draw();
window.addEventListener('resize', draw);
</script>
</html>
