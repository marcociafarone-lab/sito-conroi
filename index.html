<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: #000 !important; }
  body {
    background: #000 !important;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: pointer;
    display: block;
  }
  .margine {
    position: fixed;
    font-family: 'Courier New', Courier, monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.18);
    pointer-events: none;
    user-select: none;
    line-height: 1.8;
  }
  .bl { bottom: 28px; left: 32px; }
  .br { bottom: 28px; right: 32px; text-align: right; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<a href="https://opensea.io/collection/440-hz-bit-less" target="_blank" style="
  position:fixed;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Courier New', monospace;
  font-size: 8px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.18);
  text-decoration: none;
  white-space: nowrap;
  z-index: 1;
  transition: color 0.4s;
" id="hex-link">0xfbd8d4fcaffc8b126ae77b64d1b238b952659a6df47c7dfe4a5186241abb1770</a>
<div style="
  position:fixed;
  bottom: 28px;
  left: 32px;
  font-family: 'Courier New', monospace;
  font-size: 8px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.15);
  pointer-events: none;
  line-height: 1.9;
  z-index: 1;
">noise update · 27.5 Hz<br>oscillation · 0.44 Hz</div>
<script>
const data = `
000000000000000000000000000000000000000000
000000000000000000000000000000000000000000
001111111111111111111111111111111111111100
001111111111111111111111111111111111111100
001100000000000000000000000000000000000000
001100000000000000000000000000000000000000
001100111111111111111111111111111111111100
001100111111111111111111111111111111111100
001100110000000000000000000000000000001100
001100110000000000000000000000000000001100
001100110011111111111111111111111111001100
001100110011111111111111111111111111001100
001100110011000000000000000000000011001100
001100110011000000000000000000000011001100
001100110011001111111111111111110011001100
001100110011001111111111111111110011001100
001100110011001100000000000000000011001100
001100110011001100000000000000000011001100
001100110011001100111111111111110011001100
001100110011001100111111111111110011001100
001100110011001100110000000000110011001100
001100110011001100110000000000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000110000110011001100
001100110011001100110000000000110011001100
001100110011001100110000000000110011001100
001100110011001100111111111111110011001100
001100110011001100111111111111110011001100
001100110000000000000000000000000000001100
001100110000000000000000000000000000001100
001100111111111111111111111111111111111100
001100111111111111111111111111111111111100
001100000000000000000000000000000000000000
001100000000000000000000000000000000000000
001111111111111111111111111111111111111100
001111111111111111111111111111111111111100
000000000000000000000000000000000000000000
000000000000000000000000000000000000000000`.trim().split('\n');

const rows = data.length;
const cols = data[0].length;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function getScale() {
  const s = Math.min(
    Math.floor((window.innerWidth * 0.8) / cols),
    Math.floor((window.innerHeight * 0.8) / rows)
  );
  return Math.max(4, s);
}

let SCALE = getScale();

function setSize() {
  SCALE = getScale();
  canvas.width = cols * SCALE;
  canvas.height = rows * SCALE;
}

setSize();
window.addEventListener('resize', setSize);

// Canvas noise — copre tutta la pagina
const noiseCanvas = document.createElement('canvas');
noiseCanvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;';
document.body.appendChild(noiseCanvas);
const noiseCtx = noiseCanvas.getContext('2d');

function generateNoise() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  noiseCanvas.width = W;
  noiseCanvas.height = H;

  const imageData = noiseCtx.createImageData(W, H);
  const d = imageData.data;
  const cx = W / 2, cy = H / 2;
  const maxDist = Math.sqrt(cx * cx + cy * cy);

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      const dist = Math.sqrt((x - cx) * (x - cx) + (y - cy) * (y - cy));
      // Propagazione radiale: pieno al centro, zero ai bordi
      const falloff = Math.max(0, 1 - (dist / maxDist) * 1.4);
      d[i]   = Math.random() * 255;
      d[i+1] = Math.random() * 255;
      d[i+2] = Math.random() * 255;
      d[i+3] = Math.random() * 60 * falloff;
    }
  }
  noiseCtx.putImageData(imageData, 0, 0);
}

generateNoise();
window.addEventListener('resize', generateNoise);

// 440 Hz → frequenza visiva: 440/1000 = 0.44 Hz
// A 60fps: incremento t = (2π × 0.44) / 60 ≈ 0.04608
const FREQ_440 = (2 * Math.PI * 0.44) / 60;

// Noise a 27.5 Hz — sottomultiplo del La (440/16), a 60fps ogni ~2.18 frame
const NOISE_INTERVAL = Math.round(60 / 27.5);

let t = 0;
let noiseFrame = 0;

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Simbolo — pulsazione a 0.44 Hz derivata da 440 Hz
  const alpha = 0.75 + 0.25 * Math.sin(t);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ffffff';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (data[r][c] === '1') {
        ctx.fillRect(c * SCALE, r * SCALE, SCALE, SCALE);
      }
    }
  }
  ctx.globalAlpha = 1;

  // Noise a 27.5 Hz
  noiseFrame++;
  if (noiseFrame % NOISE_INTERVAL === 0) generateNoise();

  t += FREQ_440;
  requestAnimationFrame(draw);
}

draw();

// Posiziona l'hex sotto il simbolo
const hexLink = document.getElementById('hex-link');

function posizionaHex() {
  const rect = canvas.getBoundingClientRect();
  hexLink.style.top = (rect.bottom + 14) + 'px';
}

posizionaHex();
window.addEventListener('resize', posizionaHex);
hexLink.addEventListener('mouseover', () => { hexLink.style.color = 'rgba(255,255,255,0.5)'; });
hexLink.addEventListener('mouseout',  () => { hexLink.style.color = 'rgba(255,255,255,0.18)'; });

canvas.addEventListener('click', () => {
  window.location.href = '/bitless';
});
</script>
</body>
</html>
