<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONROI — Bitless</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  #video-wrap {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  #video-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Overlay per catturare eventi e mostrare UI */
  #overlay {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  /* Torna al simbolo — angolo alto sinistra */
  #back {
    position: fixed;
    top: 28px;
    left: 32px;
    z-index: 10;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0);
    cursor: pointer;
    pointer-events: all;
    transition: color 0.6s;
    text-decoration: none;
    display: block;
  }

  #back:hover {
    color: rgba(255,255,255,0.5);
  }

  /* Superfici — angolo basso destra, appaiono verso la fine */
  #superfici {
    position: fixed;
    top: 28px;
    right: 32px;
    z-index: 10;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0);
    line-height: 2;
    text-align: right;
    pointer-events: all;
    transition: color 1.2s;
  }

  #superfici a {
    display: block;
    color: inherit;
    text-decoration: none;
    cursor: pointer;
  }

  #superfici a:hover {
    color: rgba(255,255,255,0.6) !important;
  }

  #superfici.visible {
    color: rgba(255,255,255,0.22);
  }

  /* Titolo — compare brevemente all'inizio */
  #titolo {
    position: fixed;
    bottom: 28px;
    left: 32px;
    z-index: 10;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0);
    pointer-events: none;
    transition: color 2s;
  }

  #titolo.visible {
    color: rgba(255,255,255,0.18);
  }
</style>
</head>
<body>

<div id="video-wrap">
  <iframe
    id="yt"
    src="https://www.youtube.com/embed/4bfe5OdyMMM?autoplay=1&mute=0&controls=0&rel=0&modestbranding=1&enablejsapi=1"
    allow="autoplay; fullscreen"
    allowfullscreen>
  </iframe>
</div>

<div id="overlay"></div>

<a id="back" href="/">&#x25A1;</a>

<div id="titolo">bitless</div>

<div id="superfici">
  <a href="/blues-rosa">blues rosa</a>
  <a href="/matrice">matrice</a>
  <a href="/che-altro">che altro</a>
</div>

<script>
  // Titolo appare dopo 3 secondi, poi svanisce
  const titolo = document.getElementById('titolo');
  const superfici = document.getElementById('superfici');
  const back = document.getElementById('back');

  setTimeout(() => {
    titolo.classList.add('visible');
    back.style.color = 'rgba(255,255,255,0.18)';
  }, 3000);

  setTimeout(() => {
    titolo.classList.remove('visible');
  }, 8000);

  // Superfici appaiono a 6 secondi — sullo stacco a nero
  setTimeout(() => {
    superfici.classList.add('visible');
  }, 6000);
</script>
</body>
</html>
